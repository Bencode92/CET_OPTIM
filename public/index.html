<script type="text/babel">
// ─── Globals from CDN ─────────────────────────────────────────────────────
const {useState,useMemo,useCallback,useEffect,useRef} = React;
const {BarChart,Bar,LineChart,Line,XAxis,YAxis,CartesianGrid,
       Tooltip,Legend,ResponsiveContainer,Cell,ReferenceLine} = Recharts;

// ─── Constants ────────────────────────────────────────────────────────────
const RGDU = {smicH:12.02, seuil:3, tMin:0.02, tMax:0.4013, tDelta:0.3813, pow:1.75};
const COTIS = 0.48;
const PROXY = 'https://studyforge-proxy.benoit-comas.workers.dev';
const GH_PATH = 'Bencode92/CET_OPTIM/contents/data/historique/latest_marges.csv';
const TABS = ['Upload','Simulation','Graphiques','Synthèse','PERCOL'];

// ─── Styles ───────────────────────────────────────────────────────────────
const S = {
  page:    {padding:'24px 32px',maxWidth:1400,margin:'0 auto'},
  card:    {background:'#111827',borderRadius:12,border:'1px solid #1e293b',padding:24,marginBottom:20},
  title:   {fontSize:24,fontWeight:700,color:'#fff',marginBottom:4},
  sub:     {fontSize:13,color:'#64748b'},
  tabBar:  {display:'flex',gap:4,borderBottom:'1px solid #1e293b',marginBottom:24},
  tab:     (a,d)=>({padding:'8px 16px',fontSize:13,fontWeight:500,cursor:d?'not-allowed':'pointer',
            background:a?'#111827':'transparent',color:a?'#22c55e':'#64748b',
            border:a?'1px solid #1e293b':'1px solid transparent',borderBottom:a?'1px solid #111827':'none',
            borderRadius:'8px 8px 0 0',opacity:d?.35:1}),
  grid:    (c)=>({display:'grid',gridTemplateColumns:'repeat('+c+',1fr)',gap:16}),

  tdR:     {textAlign:'right'},
  green:   {color:'#22c55e',fontWeight:700},
  blue:    {color:'#60a5fa'},
  btn:     {padding:'10px 24px',background:'#22c55e',color:'#fff',fontWeight:600,border:'none',borderRadius:8,cursor:'pointer',fontSize:14},
  btnSec:  (a)=>({padding:'8px 16px',background:a?'#22c55e':'#1e293b',color:a?'#fff':'#94a3b8',border:'none',borderRadius:8,cursor:'pointer',fontSize:13,fontWeight:500}),
  input:   {width:'100%',padding:'8px 12px',background:'#0a0f1e',border:'1px solid #334155',borderRadius:8,color:'#22c55e',fontSize:16,fontWeight:700,textAlign:'center'},
  errBox:  {padding:12,background:'#450a0a',border:'1px solid #7f1d1d',borderRadius:8,color:'#fca5a5',fontSize:13,marginBottom:16},
  msgBox:  {padding:12,background:'#052e16',border:'1px solid #166534',borderRadius:8,color:'#86efac',fontSize:13,marginBottom:16},
  footer:  {marginTop:32,textAlign:'center',fontSize:11,color:'#334155'},
  insightBox:{background:'#052e16',border:'1px solid #166534',borderRadius:12,padding:24},
};

// ─── French CSV Parser ────────────────────────────────────────────────────
function parseCSVFrench(text) {
  if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
  const firstLine = text.split(/\r?\n/)[0];
  const delimiter = firstLine.includes(';') ? ';' : ',';
  const lines = text.split(/\r?\n/).filter(l => l.trim());
  const headers = lines[0].split(delimiter).map(h => h.trim());
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const values = lines[i].split(delimiter);
    const row = {};
    headers.forEach((h, j) => {
      let val = (values[j] || '').trim();
      const numVal = val.replace(',', '.');
      const parsed = parseFloat(numVal);
      row[h] = !isNaN(parsed) && val !== '' ? parsed : val;
    });
    rows.push(row);
  }
  return rows;
}

function parseFile(buf, name) {
  const ext = name.split('.').pop().toLowerCase();
  let rows;
  if (ext === 'csv') {
    rows = parseCSVFrench(new TextDecoder('utf-8').decode(buf));
  } else {
    const wb = XLSX.read(buf, {type:'array'});
    rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
  }
  return mapRows(rows);
}

function mapRows(rows) {
  const det = (cols, p) => cols.find(c => {
    const cl = c.toLowerCase();
    return p.every(x => cl.includes(x));
  });
  const cols = rows.length ? Object.keys(rows[0]) : [];
  const cm = {
    hrs: det(cols,['hrs','paye']) || det(cols,['heures']),
    brut: det(cols,['brut','réel']) || det(cols,['brut','reel']),
    ifm: det(cols,['ifm','réel']) || det(cols,['ifm','reel']) || det(cols,['ifm']),
    iccp: det(cols,['iccp','réel']) || det(cols,['iccp','reel']) || det(cols,['iccp']),
    matricule: det(cols,['matricule']),
    nom: det(cols,['nom']) || det(cols,['salarié']),
    cotPat: det(cols,['cot','pat']),
    reduction: det(cols,['réduction']) || det(cols,['reduction']),
    marge: cols.find(c => c.toLowerCase().trim() === 'marge'),
  };
  // IFM/ICCP columns may be absent in V2 files with only base rows
  const miss = ['hrs','brut'].filter(k => !cm[k]);
  if (miss.length) throw new Error('Colonnes manquantes : ' + miss.join(', '));
  return rows.map(r => {
    let hrs = Number(r[cm.hrs]) || 0;
    let brut = Number(r[cm.brut]) || 0;
    let ifm = cm.ifm ? Number(r[cm.ifm]) || 0 : 0;
    let iccp = cm.iccp ? Number(r[cm.iccp]) || 0 : 0;
    let estime = false;
    // Cas 2 : IFM vide/0 → brut réel = base pure, estimer IFM/ICCP
    if (ifm === 0 && iccp === 0 && brut > 0) {
      ifm = brut * 0.10;
      iccp = brut * 0.11;
      brut = brut * 1.21; // brut total = base × 1.21
      estime = true;
    }
    return {
      matricule: String(r[cm.matricule] ?? ''),
      nom: String(r[cm.nom] ?? ''),
      hrs, brut, ifm, iccp, estime,
      cotPat: cm.cotPat ? Number(r[cm.cotPat]) || 0 : 0,
      redAct: cm.reduction ? Number(r[cm.reduction]) || 0 : 0,
      marge: cm.marge ? Number(r[cm.marge]) || 0 : 0,
    };
  }).filter(r => r.hrs > 0 && r.brut > 0);
}

// ─── GitHub via Cloudflare proxy ──────────────────────────────────────────
function ghLoad() {
  return fetch(PROXY+'/github/'+GH_PATH).then(r => {
    if (!r.ok) throw new Error('no file');
    return r.json();
  }).then(j => ({csv: atob(j.content.replace(/\n/g,'')), sha: j.sha}));
}
function ghSave(csv) {
  return fetch(PROXY+'/github/'+GH_PATH).then(r => r.ok ? r.json().then(j=>j.sha) : null)
    .then(sha => {
      const body = {message:'data: update marges ('+new Date().toISOString().slice(0,10)+')', content: btoa(unescape(encodeURIComponent(csv)))};
      if (sha) body.sha = sha;
      return fetch(PROXY+'/github/'+GH_PATH, {method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)});
    }).then(r => { if(!r.ok) throw new Error('GitHub save failed'); return r.json(); });
}

// ─── RGDU calc ────────────────────────────────────────────────────────────
function calcRgdu(hrs, brut) {
  if (hrs <= 0 || brut <= 0) return 0;
  const ratio = (RGDU.seuil * hrs * RGDU.smicH) / brut;
  if (ratio <= 1) return 0;
  const c = Math.min(RGDU.tMin + RGDU.tDelta * Math.pow(0.5*(ratio-1), RGDU.pow), RGDU.tMax);
  return c * brut;
}
function simRow(row, pi, pc) {
  const ci = row.ifm*pi, cc = row.iccp*pc, ct = ci+cc;
  const bc = row.brut - ci - cc;
  const rb = calcRgdu(row.hrs, row.brut), rc = calcRgdu(row.hrs, bc);
  return {...row, cetIfm:ci, cetIccp:cc, cetTotal:ct, brutCet:bc, redBase:rb, redCet:rc, gain:rc-rb};
}

// ─── Formatters ───────────────────────────────────────────────────────────
function fmtE(v)  { v=Number(v); return isFinite(v) ? v.toLocaleString('fr-FR',{style:'currency',currency:'EUR',maximumFractionDigits:0}) : '0 €'; }
function fmtE2(v) { v=Number(v); return isFinite(v) ? v.toLocaleString('fr-FR',{style:'currency',currency:'EUR',minimumFractionDigits:2,maximumFractionDigits:2}) : '0,00 €'; }
function fmtP(v)  { v=Number(v); return isFinite(v) ? (v*100).toFixed(0)+' %' : '0 %'; }

// ─── ProgressBar Slider ──────────────────────────────────────────────────
function PBar({label, value, onChange, min=0, max=100, step=1, unit='%'}) {
  const pct = ((value-min)/(max-min))*100;
  const handleClick = e => {
    const rect = e.currentTarget.getBoundingClientRect();
    const x = (e.clientX - rect.left) / rect.width;
    const v = min + Math.round((x*(max-min))/step)*step;
    onChange(Math.max(min, Math.min(max, v)));
  };
  return (
    <div>
      <div style={{fontSize:13,color:'#94a3b8',marginBottom:6}}>{label} : <span style={{fontWeight:700,color:'#22c55e'}}>{value}{unit}</span></div>
      <div onClick={handleClick} style={{position:'relative',height:32,background:'#0a0f1e',borderRadius:8,border:'1px solid #334155',overflow:'hidden',cursor:'pointer'}}>
        <div style={{position:'absolute',top:0,bottom:0,left:0,width:pct+'%',background:'linear-gradient(90deg,#15803d,#22c55e)',borderRadius:8,transition:'width .15s'}}/>
        <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:700,color:'#fff'}}>{value}{unit}</div>
      </div>
      <div style={{display:'flex',justifyContent:'space-between',fontSize:10,color:'#475569',marginTop:2}}><span>{min}{unit}</span><span>{max}{unit}</span></div>
    </div>
  );
}

// ─── NumInput ─────────────────────────────────────────────────────────────
function NumInput({label, value, onChange, min=0, max=99999}) {
  return (
    <div>
      <div style={{fontSize:13,color:'#94a3b8',marginBottom:6}}>{label}</div>
      <input type="number" min={min} max={max} value={value} onChange={e => {
        const v = parseInt(e.target.value) || 0;
        onChange(Math.max(min, Math.min(max, v)));
      }} style={S.input}/>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
//  MAIN COMPONENT
// ═══════════════════════════════════════════════════════════════════════════
function App() {
  const [tab, setTab] = useState(0);
  const [data, setData] = useState([]);
  const [fname, setFname] = useState('');
  const [err, setErr] = useState('');
  const [msg, setMsg] = useState('');
  const [loading, setLoading] = useState(true);
  const [rawCsv, setRawCsv] = useState('');
  const [pctIfm, setPctIfm] = useState(30);
  const [pctIccp, setPctIccp] = useState(30);
  const [effectif, setEffectif] = useState(656);
  const [fSocial, setFSocial] = useState(16);
  const [rendCet, setRendCet] = useState(3);
  const [txAdh, setTxAdh] = useState(30);

  // Auto-load from GitHub
  useEffect(() => {
    ghLoad().then(res => {
      try {
        const parsed = mapRows(parseCSVFrench(res.csv));
        setData(parsed); setFname('latest_marges.csv (GitHub)'); setRawCsv(res.csv);
        if (parsed.length > 0) setTab(1);
      } catch(e) {}
    }).catch(()=>{}).finally(()=>setLoading(false));
  }, []);

  const onFile = useCallback(e => {
    const file = e.target.files?.[0]; if (!file) return;
    setErr(''); setMsg('');
    file.arrayBuffer().then(buf => {
      try {
        const parsed = parseFile(buf, file.name);
        const reader = new FileReader();
        reader.onload = () => {
          const csv = reader.result;
          setRawCsv(csv); setData(parsed); setFname(file.name); setTab(1);
          setMsg('Sauvegarde GitHub...');
          ghSave(csv).then(()=>{setMsg('✓ Sauvegardé');setTimeout(()=>setMsg(''),3000);}).catch(er=>setMsg('⚠ '+er.message));
        };
        reader.readAsText(file);
      } catch(er) { setErr(er.message); }
    });
  }, []);

  // ─── Simulation ──────────────────────────────────────────────────
  const sim = useMemo(() => data.map(r => simRow(r, pctIfm/100, pctIccp/100)), [data,pctIfm,pctIccp]);
  const tot = useMemo(() => {
    const t = {n:sim.length, hrs:0, brut:0, ifm:0, iccp:0, cet:0, rB:0, rC:0, gain:0};
    sim.forEach(r => { t.hrs+=r.hrs; t.brut+=r.brut; t.ifm+=r.ifm; t.iccp+=r.iccp; t.cet+=r.cetTotal; t.rB+=r.redBase; t.rC+=r.redCet; t.gain+=r.gain; });
    return t;
  }, [sim]);

  const xf = tot.n > 0 ? effectif / tot.n : 1;
  const gA = tot.gain * 12, gX = gA * xf;

  const scenData = useMemo(() => [0,10,20,30,50,100].map(p => {
    const rows = data.map(r => simRow(r, p/100, p/100));
    const g = rows.reduce((s,r)=>s+r.gain,0);
    return {name:p+'%', gM:g, gA:g*12, gX:g*12*xf};
  }), [data,xf]);

  // ─── PERCOL ──────────────────────────────────────────────────────
  const percol = useMemo(() => {
    const avg = tot.n>0 ? tot.cet/tot.n : 0, ann = avg*12;
    const rend = ann*(rendCet/100), total = ann+rend;
    const cc = ann*COTIS, ccc = cc+rend;
    const fs = fSocial/100, fa = total*fs, ccp = fa+rend;
    const ec = cc - ccp, nbA = Math.round(effectif*(txAdh/100));
    const adhS = [20,30,50,70,100].map(t => ({taux:t+'%', nb:Math.round(effectif*(t/100)), ec:ec*Math.round(effectif*(t/100))}));
    return { avg, ann, rend, sc:[
      {n:'Cash direct',  p:ann, rv:0,    co:cc,  fo:0,  ct:cc,  ec:0},
      {n:'CET → Cash',   p:ann, rv:rend, co:cc,  fo:0,  ct:ccc, ec:cc-ccc},
      {n:'CET → PERCOL', p:ann, rv:rend, co:0,   fo:fa, ct:ccp, ec:ec},
    ], nbA, ecTot:ec*nbA, adhS };
  }, [tot,rendCet,fSocial,effectif,txAdh]);

  const has = data.length > 0;

  if (loading) return <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh',color:'#22c55e',fontSize:18}}>Chargement...</div>;

  return (
    <div style={S.page}>
      <div style={{marginBottom:20}}>
        <div style={S.title}>Simulateur CET × RGDU 2026</div>
        <div style={S.sub}>Optimisation charges patronales intérim — Schéma 3 étages
          {fname && <span style={{marginLeft:8,color:'#22c55e'}}>({fname} — {data.length} lignes)</span>}
        </div>
      </div>

      {/* Tabs */}
      <div style={S.tabBar}>
        {TABS.map((n,i) => <div key={n} style={S.tab(tab===i, i>0&&!has)} onClick={()=>{if(i===0||has)setTab(i);}}>{n}</div>)}
      </div>

      {err && <div style={S.errBox}>{err}</div>}
      {msg && <div style={S.msgBox}>{msg}</div>}

      {/* ═══ UPLOAD ══════════════════════════════════════════════════ */}
      {tab===0 && <div>
        <div style={{...S.card, textAlign:'center', maxWidth:520, margin:'0 auto'}}>
          <div style={{fontSize:48,marginBottom:12}}>📄</div>
          <div style={{fontSize:16,fontWeight:600,color:'#fff',marginBottom:8}}>Charger un fichier Marges</div>
          <div style={{fontSize:13,color:'#64748b',marginBottom:20}}>CSV (séparateur ;) ou XLSX — Colonnes : Hrs Paye, Brut réel, IFM réelles, ICCP réelles</div>
          {has && <div style={{...S.msgBox,marginBottom:16}}>✓ {data.length} salariés chargés depuis {fname}</div>}
          <label style={{...S.btn,display:'inline-block'}}>
            {has ? 'Actualiser le fichier' : 'Sélectionner un fichier'}
            <input type="file" accept=".csv,.xlsx,.xls" onChange={onFile} style={{display:'none'}}/>
          </label>
          <div style={{fontSize:11,color:'#475569',marginTop:12}}>Les CSV sont sauvegardés automatiquement sur GitHub</div>
        </div>
        <div style={{...S.card, maxWidth:520, margin:'20px auto 0'}}>
          <div style={{fontWeight:600,fontSize:13,color:'#fff',marginBottom:12}}>Paramètres RGDU 2026</div>
          <table style={S.table}><tbody>
            {[['SMIC horaire',RGDU.smicH+' €'],["Seuil d'extinction",RGDU.seuil+' × SMIC'],['Tmin',fmtP(RGDU.tMin)],['Tmax',fmtP(RGDU.tMax)],['Tδ',fmtP(RGDU.tDelta)],['Puissance',''+RGDU.pow]].map(([k,v])=>(
              <tr key={k} style={{borderBottom:'1px solid #1e293b'}}><td style={{padding:'4px 0',color:'#94a3b8'}}>{k}</td><td style={{padding:'4px 0',textAlign:'right',fontFamily:'monospace',color:'#fff'}}>{v}</td></tr>
            ))}
          </tbody></table>
        </div>
      </div>}

      {/* ═══ SIMULATION ══════════════════════════════════════════════ */}
      {tab===1 && has && <div>
        <div style={{...S.card,...S.grid(3)}}>
          <PBar label="% IFM vers CET" value={pctIfm} onChange={setPctIfm}/>
          <PBar label="% ICCP vers CET" value={pctIccp} onChange={setPctIccp}/>
          <NumInput label="Effectif total" value={effectif} onChange={setEffectif}/>
        </div>
        <div style={{...S.grid(5),marginBottom:20}}>
          {[
            ['Salariés',tot.n+' ('+sim.filter(r=>!r.estime).length+' réels + '+sim.filter(r=>r.estime).length+' estimés)','#8b5cf6'],
            ['CET mensuel total',fmtE(tot.cet),'#3b82f6'],
            ['Gain RGDU mensuel',fmtE2(tot.gain),'#22c55e'],
            ['Gain annuel',fmtE(gA),'#22c55e'],
            ['Gain annuel extrapolé',fmtE(gX),'#f59e0b'],
          ].map(([l,v,c])=>(
            <div key={l} style={S.kpi(c)}><div style={S.kpiLabel}>{l}</div><div style={S.kpiVal}>{v}</div></div>
          ))}
        </div>
        <div style={{...S.card,padding:0,overflow:'auto'}}>
          <table style={S.table}>
            <thead><tr>
              {['#','Matricule','Hrs','Brut réel','IFM','ICCP','CET IFM','CET ICCP','CET Total','Brut CET','Réd. base','Réd. CET','Gain'].map(h=>(
                <th key={h} style={S.th}>{h}</th>
              ))}
            </tr></thead>
            <tbody>
              {sim.slice(0,50).map((r,i)=>(
                <tr key={i}>
                  <td style={{...S.td(i%2),...S.tdR,color:'#475569'}}>{i+1}</td>
                  <td style={{...S.td(i%2),fontFamily:'monospace'}}>{r.matricule}{r.estime && <span style={{marginLeft:4,fontSize:9,padding:'1px 4px',borderRadius:3,background:'#7c3aed',color:'#fff',verticalAlign:'middle'}}>EST</span>}</td>
                  <td style={{...S.td(i%2),...S.tdR}}>{r.hrs}</td>
                  <td style={{...S.td(i%2),...S.tdR,color:r.estime?'#a78bfa':undefined}}>{fmtE2(r.brut)}</td>
                  <td style={{...S.td(i%2),...S.tdR,color:r.estime?'#a78bfa':undefined}}>{fmtE2(r.ifm)}</td>
                  <td style={{...S.td(i%2),...S.tdR,color:r.estime?'#a78bfa':undefined}}>{fmtE2(r.iccp)}</td>
                  <td style={{...S.td(i%2),...S.tdR,...S.blue}}>{fmtE2(r.cetIfm)}</td>
                  <td style={{...S.td(i%2),...S.tdR,...S.blue}}>{fmtE2(r.cetIccp)}</td>
                  <td style={{...S.td(i%2),...S.tdR,color:'#93c5fd',fontWeight:600}}>{fmtE2(r.cetTotal)}</td>
                  <td style={{...S.td(i%2),...S.tdR}}>{fmtE2(r.brutCet)}</td>
                  <td style={{...S.td(i%2),...S.tdR}}>{fmtE2(r.redBase)}</td>
                  <td style={{...S.td(i%2),...S.tdR}}>{fmtE2(r.redCet)}</td>
                  <td style={{...S.td(i%2),...S.tdR,...S.green}}>{fmtE2(r.gain)}</td>
                </tr>
              ))}
              <tr style={{background:'#0f172a',fontWeight:600}}>
                <td style={{padding:'8px 10px',color:'#fff'}} colSpan={2}>TOTAUX ({tot.n})</td>
                <td style={{...S.tdR,padding:'8px 10px',color:'#fff'}}>{tot.hrs.toFixed(0)}</td>
                <td style={{...S.tdR,padding:'8px 10px'}}>{fmtE(tot.brut)}</td>
                <td style={{...S.tdR,padding:'8px 10px'}}>{fmtE(tot.ifm)}</td>
                <td style={{...S.tdR,padding:'8px 10px'}}>{fmtE(tot.iccp)}</td>
                <td style={{...S.tdR,padding:'8px 10px'}} colSpan={2}/>
                <td style={{...S.tdR,padding:'8px 10px',color:'#93c5fd'}}>{fmtE(tot.cet)}</td>
                <td style={{...S.tdR,padding:'8px 10px'}}>{fmtE(tot.brut-tot.cet)}</td>
                <td style={{...S.tdR,padding:'8px 10px'}}>{fmtE(tot.rB)}</td>
                <td style={{...S.tdR,padding:'8px 10px'}}>{fmtE(tot.rC)}</td>
                <td style={{...S.tdR,padding:'8px 10px',...S.green}}>{fmtE2(tot.gain)}</td>
              </tr>
            </tbody>
          </table>
          {sim.length > 50 && <div style={{textAlign:'center',padding:8,fontSize:11,color:'#475569'}}>50 premières lignes sur {sim.length}</div>}
        </div>
      </div>}

      {/* ═══ GRAPHIQUES ══════════════════════════════════════════════ */}
      {tab===2 && has && <div>
        <div style={S.card}>
          <div style={{fontWeight:600,color:'#fff',marginBottom:16}}>Gain RGDU annuel par scénario CET</div>
          <ResponsiveContainer width="100%" height={350}>
            <BarChart data={scenData}><CartesianGrid stroke="#1e293b"/><XAxis dataKey="name" stroke="#64748b"/><YAxis stroke="#64748b" tickFormatter={v=>(v/1000).toFixed(0)+'k€'}/>
              <Tooltip formatter={v=>fmtE(v)} contentStyle={{background:'#1e293b',border:'none',borderRadius:8,color:'#fff'}}/>
              <Legend/><Bar dataKey="gA" name="Gain annuel (fichier)" fill="#3b82f6" radius={[4,4,0,0]}/><Bar dataKey="gX" name={'Gain extrapolé ('+effectif+')'} fill="#22c55e" radius={[4,4,0,0]}/>
            </BarChart>
          </ResponsiveContainer>
        </div>
        <div style={S.card}>
          <div style={{fontWeight:600,color:'#fff',marginBottom:16}}>Courbe du gain mensuel</div>
          <ResponsiveContainer width="100%" height={300}>
            <LineChart data={scenData}><CartesianGrid stroke="#1e293b"/><XAxis dataKey="name" stroke="#64748b"/><YAxis stroke="#64748b" tickFormatter={v=>v.toFixed(0)+'€'}/>
              <Tooltip formatter={v=>fmtE2(v)} contentStyle={{background:'#1e293b',border:'none',borderRadius:8,color:'#fff'}}/>
              <Line type="monotone" dataKey="gM" name="Gain mensuel" stroke="#22c55e" strokeWidth={2} dot={{r:5,fill:'#22c55e'}}/><ReferenceLine y={0} stroke="#475569" strokeDasharray="3 3"/>
            </LineChart>
          </ResponsiveContainer>
        </div>
        <div style={S.card}>
          <div style={{fontWeight:600,color:'#fff',marginBottom:16}}>Distribution par salarié (mensuel)</div>
          <ResponsiveContainer width="100%" height={300}>
            <BarChart data={sim.map((r,i)=>({i:i+1,g:r.gain}))}><CartesianGrid stroke="#1e293b"/><XAxis dataKey="i" stroke="#64748b"/><YAxis stroke="#64748b" tickFormatter={v=>v.toFixed(1)+'€'}/>
              <Tooltip formatter={v=>fmtE2(v)} contentStyle={{background:'#1e293b',border:'none',borderRadius:8,color:'#fff'}}/>
              <Bar dataKey="g" name="Gain RGDU" fill="#22c55e" radius={[2,2,0,0]}/>
            </BarChart>
          </ResponsiveContainer>
        </div>
      </div>}

      {/* ═══ SYNTHÈSE ════════════════════════════════════════════════ */}
      {tab===3 && has && <div>
        <div style={S.card}>
          <div style={{fontWeight:600,fontSize:16,color:'#fff',marginBottom:16}}>Synthèse — 3 scénarios CET</div>
          <table style={S.table}>
            <thead><tr><th style={S.th}/><th style={{...S.th,...S.tdR,color:'#60a5fa'}}>Prudent (10%)</th><th style={{...S.th,...S.tdR,color:'#fbbf24'}}>Moyen (30%)</th><th style={{...S.th,...S.tdR,color:'#22c55e'}}>Ambitieux (50%)</th></tr></thead>
            <tbody>
              {(() => {
                const sc = [10,30,50].map(p => {
                  const rows = data.map(r => simRow(r,p/100,p/100));
                  const g = rows.reduce((s,r)=>s+r.gain,0);
                  const c = rows.reduce((s,r)=>s+r.cetTotal,0);
                  return {p, gM:g, gA:g*12, gX:g*12*xf, cM:c, cA:c*12, gAvg:g/(rows.length||1)};
                });
                return [['CET mensuel',s=>fmtE(s.cM)],['CET annuel',s=>fmtE(s.cA)],['Gain RGDU mensuel',s=>fmtE2(s.gM)],['Gain RGDU annuel',s=>fmtE(s.gA)],['Gain annuel extrapolé',s=>fmtE(s.gX)],['Gain moyen/sal./mois',s=>fmtE2(s.gAvg)]].map(([l,fn])=>(
                  <tr key={l} style={{borderBottom:'1px solid #1e293b'}}><td style={{padding:'8px 0',color:'#94a3b8'}}>{l}</td>
                    {sc.map(s=><td key={s.p} style={{padding:'8px 0',textAlign:'right',fontFamily:'monospace',color:'#fff'}}>{fn(s)}</td>)}
                  </tr>
                ));
              })()}
            </tbody>
          </table>
          <div style={{marginTop:12,fontSize:11,color:'#475569'}}>Extrapolation ×{xf.toFixed(2)} ({tot.n} → {effectif}). Annualisation ×12.</div>
        </div>
        <div style={S.card}>
          <div style={{fontWeight:600,color:'#fff',marginBottom:16}}>Gain annuel extrapolé</div>
          <ResponsiveContainer width="100%" height={300}>
            <BarChart data={[10,30,50].map(p => {
              const g = data.map(r=>simRow(r,p/100,p/100)).reduce((s,r)=>s+r.gain,0);
              return {name:p+'% CET',v:g*12*xf};
            })}><CartesianGrid stroke="#1e293b"/><XAxis dataKey="name" stroke="#64748b"/><YAxis stroke="#64748b" tickFormatter={v=>(v/1000).toFixed(0)+'k€'}/>
              <Tooltip formatter={v=>fmtE(v)} contentStyle={{background:'#1e293b',border:'none',borderRadius:8,color:'#fff'}}/>
              <Bar dataKey="v" name="Gain extrapolé" radius={[4,4,0,0]}>
                {[0,1,2].map(i=><Cell key={i} fill={['#3b82f6','#fbbf24','#22c55e'][i]}/>)}
              </Bar>
            </BarChart>
          </ResponsiveContainer>
        </div>
      </div>}

      {/* ═══ PERCOL ══════════════════════════════════════════════════ */}
      {tab===4 && has && <div>
        <div style={{...S.card,...S.grid(4)}}>
          <PBar label="% IFM vers CET" value={pctIfm} onChange={setPctIfm}/>
          <PBar label="% ICCP vers CET" value={pctIccp} onChange={setPctIccp}/>
          <div>
            <div style={{fontSize:13,color:'#94a3b8',marginBottom:6}}>Forfait social : <span style={{fontWeight:700,color:'#22c55e'}}>{fSocial} %</span></div>
            <div style={{display:'flex',gap:8}}>
              {[16,20].map(v=><button key={v} onClick={()=>setFSocial(v)} style={S.btnSec(fSocial===v)}>{v}%{v===16?' (pilotée)':' (standard)'}</button>)}
            </div>
          </div>
          <PBar label="Rendement CET" value={rendCet} onChange={setRendCet} min={1} max={8} step={0.5}/>
        </div>
        <div style={S.card}><PBar label="Taux d'adhésion PERCOL" value={txAdh} onChange={setTxAdh} min={10} max={100} step={5}/></div>

        <div style={S.card}>
          <div style={{fontWeight:600,fontSize:16,color:'#fff',marginBottom:16}}>Comparaison par intérimaire (CET moyen : {fmtE2(percol.avg)}/mois → {fmtE(percol.ann)}/an)</div>
          <table style={S.table}>
            <thead><tr><th style={S.th}/><th style={{...S.th,...S.tdR,color:'#94a3b8'}}>Cash direct</th><th style={{...S.th,...S.tdR,color:'#fbbf24'}}>CET → Cash</th><th style={{...S.th,...S.tdR,color:'#22c55e'}}>CET → PERCOL</th></tr></thead>
            <tbody>
              {[['Principal annuel','p'],['Rendement CET versé','rv'],['Cotisations patronales (48%)','co'],['Forfait social ('+fSocial+'%)','fo'],['Coût total employeur','ct'],['Économie vs cash','ec']].map(([l,k])=>(
                <tr key={l} style={{borderBottom:'1px solid #1e293b',fontWeight:k==='ct'||k==='ec'?700:400,background:k==='ct'?'#0f172a':'transparent'}}>
                  <td style={{padding:'8px 0',color:'#94a3b8'}}>{l}</td>
                  {percol.sc.map(s=><td key={s.n} style={{padding:'8px 0',textAlign:'right',fontFamily:'monospace',color:k==='ec'&&s[k]>0?'#22c55e':k==='ec'&&s[k]<0?'#f87171':'#fff'}}>{fmtE(s[k])}</td>)}
                </tr>
              ))}
            </tbody>
          </table>
        </div>

        <div style={S.card}>
          <div style={{fontWeight:600,fontSize:16,color:'#fff',marginBottom:16}}>Extrapolation — {effectif} intérimaires</div>
          <table style={S.table}>
            <thead><tr><th style={S.th}>Taux adhésion</th><th style={{...S.th,...S.tdR}}>Nb</th><th style={{...S.th,...S.tdR}}>Économie annuelle</th></tr></thead>
            <tbody>
              {percol.adhS.map(s=>(
                <tr key={s.taux} style={{borderBottom:'1px solid #1e293b',background:s.taux===txAdh+'%'?'#052e16':'transparent'}}>
                  <td style={{padding:'8px 0',color:'#fff'}}>{s.taux}</td>
                  <td style={{...S.tdR,padding:'8px 0',fontFamily:'monospace',color:'#fff'}}>{s.nb}</td>
                  <td style={{...S.tdR,padding:'8px 0',fontFamily:'monospace',...S.green}}>{fmtE(s.ec)}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>

        <div style={{...S.grid(2)}}>
          <div style={S.card}>
            <div style={{fontWeight:600,color:'#fff',marginBottom:16}}>Coût employeur par scénario</div>
            <ResponsiveContainer width="100%" height={300}>
              <BarChart data={percol.sc}><CartesianGrid stroke="#1e293b"/><XAxis dataKey="n" stroke="#64748b"/><YAxis stroke="#64748b" tickFormatter={v=>v.toFixed(0)+'€'}/>
                <Tooltip formatter={v=>fmtE(v)} contentStyle={{background:'#1e293b',border:'none',borderRadius:8,color:'#fff'}}/><Legend/>
                <Bar dataKey="co" name="Cotisations" stackId="a" fill="#ef4444"/><Bar dataKey="fo" name="Forfait social" stackId="a" fill="#fbbf24"/><Bar dataKey="rv" name="Rendement" stackId="a" fill="#3b82f6"/>
              </BarChart>
            </ResponsiveContainer>
          </div>
          <div style={S.card}>
            <div style={{fontWeight:600,color:'#fff',marginBottom:16}}>Économie par taux d'adhésion</div>
            <ResponsiveContainer width="100%" height={300}>
              <BarChart data={percol.adhS}><CartesianGrid stroke="#1e293b"/><XAxis dataKey="taux" stroke="#64748b"/><YAxis stroke="#64748b" tickFormatter={v=>(v/1000).toFixed(0)+'k€'}/>
                <Tooltip formatter={v=>fmtE(v)} contentStyle={{background:'#1e293b',border:'none',borderRadius:8,color:'#fff'}}/>
                <Bar dataKey="ec" name="Économie" radius={[4,4,0,0]}>
                  {percol.adhS.map((_,i)=><Cell key={i} fill={['#3b82f6','#22c55e','#fbbf24','#ef4444','#8b5cf6'][i]}/>)}
                </Bar>
              </BarChart>
            </ResponsiveContainer>
          </div>
        </div>

        <div style={S.insightBox}>
          <div style={{fontWeight:700,color:'#22c55e',fontSize:18,marginBottom:12}}>Levier : 48% → {fSocial}% = économie de {48-fSocial} points</div>
          <div style={S.grid(3)}>
            <div style={{textAlign:'center'}}><div style={{fontSize:28,fontWeight:700,color:'#22c55e'}}>{fmtE(percol.sc[2].ec)}</div><div style={{fontSize:12,color:'#16a34a'}}>économie / intérimaire / an</div></div>
            <div style={{textAlign:'center'}}><div style={{fontSize:28,fontWeight:700,color:'#22c55e'}}>{percol.nbA}</div><div style={{fontSize:12,color:'#16a34a'}}>adhérents ({txAdh}%)</div></div>
            <div style={{textAlign:'center'}}><div style={{fontSize:28,fontWeight:700,color:'#22c55e'}}>{fmtE(percol.ecTot)}</div><div style={{fontSize:12,color:'#16a34a'}}>économie totale</div></div>
          </div>
        </div>
      </div>}

      <div style={S.footer}>Simulateur CET × RGDU 2026 — Les deltas sont fiables, les montants absolus sont à recaler.<br/>C = 0,02 + 0,3813 × [½ × (3×SMIC×H/Brut − 1)]^1,75</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
