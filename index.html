const RGDU = {smicH:12.02, seuil:3, tMin:0.02, tMax:0.4013, tDelta:0.3813, pow:1.75};
const COTIS = 0.48;
const PROXY = 'https://studyforge-proxy.benoit-comas.workers.dev';

  page:    {padding:'24px 32px',maxWidth:1400,margin:'0 auto'},

// ─── French CSV Parser ────────────────────────────────────────────────────
function parseCSVFrench(text) {
  if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
  const firstLine = text.split(/\r?\n/)[0];
  const delimiter = firstLine.includes(';') ? ';' : ',';
  const lines = text.split(/\r?\n/).filter(l => l.trim());
  const headers = lines[0].split(delimiter).map(h => h.trim());
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const values = lines[i].split(delimiter);
    const row = {};
    headers.forEach((h, j) => {
      let val = (values[j] || '').trim();
      const numVal = val.replace(',', '.');
      const parsed = parseFloat(numVal);
      row[h] = !isNaN(parsed) && val !== '' ? parsed : val;
    });
    rows.push(row);
  }
  return rows;
}

function parseFile(buf, name) {
  const ext = name.split('.').pop().toLowerCase();
  let rows;
  if (ext === 'csv') {
    rows = parseCSVFrench(new TextDecoder('utf-8').decode(buf));
  } else {
    const wb = XLSX.read(buf, {type:'array'});
    rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
  }
  return mapRows(rows);
}

function mapRows(rows) {
  const det = (cols, p) => cols.find(c => {
    const cl = c.toLowerCase();
    return p.every(x => cl.includes(x));
  });
  const cols = rows.length ? Object.keys(rows[0]) : [];
  const cm = {
    hrs: det(cols,['hrs','paye']) || det(cols,['heures']),
    brut: det(cols,['brut','réel']) || det(cols,['brut','reel']),
    ifm: det(cols,['ifm','réel']) || det(cols,['ifm','reel']) || det(cols,['ifm']),
    iccp: det(cols,['iccp','réel']) || det(cols,['iccp','reel']) || det(cols,['iccp']),
    matricule: det(cols,['matricule']),
    nom: det(cols,['nom']) || det(cols,['salarié']),
    cotPat: det(cols,['cot','pat']),
    reduction: det(cols,['réduction']) || det(cols,['reduction']),
    marge: cols.find(c => c.toLowerCase().trim() === 'marge'),
  };
  // IFM/ICCP columns may be absent in V2 files with only base rows
  const miss = ['hrs','brut'].filter(k => !cm[k]);
  if (miss.length) throw new Error('Colonnes manquantes : ' + miss.join(', '));
  return rows.map(r => {
    let hrs = Number(r[cm.hrs]) || 0;
    let brut = Number(r[cm.brut]) || 0;
    let ifm = cm.ifm ? Number(r[cm.ifm]) || 0 : 0;
    let iccp = cm.iccp ? Number(r[cm.iccp]) || 0 : 0;
    let estime = false;
    // Cas 2 : IFM vide/0 → brut réel = base pure, estimer IFM/ICCP
    if (ifm === 0 && iccp === 0 && brut > 0) {
      ifm = brut * 0.10;
      iccp = brut * 0.11;
      brut = brut * 1.21; // brut total = base × 1.21
      estime = true;
    }
    return {
      matricule: String(r[cm.matricule] ?? ''),
      nom: String(r[cm.nom] ?? ''),
      hrs, brut, ifm, iccp, estime,
      cotPat: cm.cotPat ? Number(r[cm.cotPat]) || 0 : 0,
      redAct: cm.reduction ? Number(r[cm.reduction]) || 0 : 0,
      marge: cm.marge ? Number(r[cm.marge]) || 0 : 0,
    };
  }).filter(r => r.hrs > 0 && r.brut > 0);
}

// ─── GitHub via Cloudflare proxy ──────────────────────────────────────────
function ghLoad() {
  return fetch(PROXY+'/github/'+GH_PATH).then(r => {
    if (!r.ok) throw new Error('no file');
    return r.json();
  }).then(j => ({csv: atob(j.content.replace(/\n/g,'')), sha: j.sha}));
}
function ghSave(csv) {
  return fetch(PROXY+'/github/'+GH_PATH).then(r => r.ok ? r.json().then(j=>j.sha) : null)
    .then(sha => {
      const body = {message:'data: update marges ('+new Date().toISOString().slice(0,10)+')', content: btoa(unescape(encodeURIComponent(csv)))};
      if (sha) body.sha = sha;
      return fetch(PROXY+'/github/'+GH_PATH, {method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)});
    }).then(r => { if(!r.ok) throw new Error('GitHub save failed'); return r.json(); });
}

// ─── RGDU calc ────────────────────────────────────────────────────────────
function calcRgdu(hrs, brut) {
  if (hrs <= 0 || brut <= 0) return 0;
  const ratio = (RGDU.seuil * hrs * RGDU.smicH) / brut;
  if (ratio <= 1) return 0;
  const c = Math.min(RGDU.tMin + RGDU.tDelta * Math.pow(0.5*(ratio-1), RGDU.pow), RGDU.tMax);
  return c * brut;
}
function simRow(row, pi, pc) {
  const ci = row.ifm*pi, cc = row.iccp*pc, ct = ci+cc;
  const bc = row.brut - ci - cc;
  const rb = calcRgdu(row.hrs, row.brut), rc = calcRgdu(row.hrs, bc);
  return {...row, cetIfm:ci, cetIccp:cc, cetTotal:ct, brutCet:bc, redBase:rb, redCet:rc, gain:rc-rb};
}

// ─── Formatters ───────────────────────────────────────────────────────────
function fmtE(v)  { v=Number(v); return isFinite(v) ? v.toLocaleString('fr-FR',{style:'currency',currency:'EUR',maximumFractionDigits:0}) : '0 €'; }
function fmtE2(v) { v=Number(v); return isFinite(v) ? v.toLocaleString('fr-FR',{style:'currency',currency:'EUR',minimumFractionDigits:2,maximumFractionDigits:2}) : '0,00 €'; }
function fmtP(v)  { v=Number(v); return isFinite(v) ? (v*100).toFixed(0)+' %' : '0 %'; }

// ─── ProgressBar Slider ──────────────────────────────────────────────────
function PBar({label, value, onChange, min=0, max=100, step=1, unit='%'}) {
  const [txt, setTxt] = useState(String(value));
  const prevVal = useRef(value);
  // Sync text when value changes from outside (bar click, other tab)
  if (value !== prevVal.current) { prevVal.current = value; if (String(value) !== txt) setTxt(String(value)); }
  const pct = ((value-min)/(max-min))*100;
  const handleClick = e => {
    const rect = e.currentTarget.getBoundingClientRect();
    const x = (e.clientX - rect.left) / rect.width;
    const v = min + Math.round((x*(max-min))/step)*step;
    const clamped = Math.max(min, Math.min(max, v));
    onChange(clamped); setTxt(String(clamped));
  };
  const onType = e => {
    const raw = e.target.value;
    setTxt(raw); // always let user type freely
    const num = parseFloat(raw.replace(',','.'));
    if (!isNaN(num)) onChange(Math.max(min, Math.min(max, Math.round(num/step)*step)));
  };
  const onBlur = () => {
    // On blur, snap text to actual value
    setTxt(String(value));
  };
  return (
    <div>
      <div style={{fontSize:13,color:'#94a3b8',marginBottom:6,display:'flex',alignItems:'center',gap:8}}>
        {label} :
        <input type="text" value={txt} onChange={onType} onBlur={onBlur}
          style={{width:52,padding:'2px 6px',background:'#0a0f1e',border:'1px solid #334155',borderRadius:4,color:'#22c55e',fontSize:14,fontWeight:700,textAlign:'center'}}/>
        <span style={{color:'#64748b',fontSize:12}}>{unit}</span>
      </div>
      <div onClick={handleClick} style={{position:'relative',height:28,background:'#0a0f1e',borderRadius:8,border:'1px solid #334155',overflow:'hidden',cursor:'pointer'}}>
        <div style={{position:'absolute',top:0,bottom:0,left:0,width:pct+'%',background:'linear-gradient(90deg,#15803d,#22c55e)',borderRadius:8,transition:'width .15s'}}/>
      </div>
      <div style={{display:'flex',justifyContent:'space-between',fontSize:10,color:'#475569',marginTop:2}}><span>{min}{unit}</span><span>{max}{unit}</span></div>
    </div>
  );
}

// ─── NumInput ─────────────────────────────────────────────────────────────
function NumInput({label, value, onChange, min=0, max=99999}) {
  const [txt, setTxt] = useState(String(value));
  const prevVal = useRef(value);
  if (value !== prevVal.current) { prevVal.current = value; if (String(value) !== txt) setTxt(String(value)); }
  return (
    <div>
      <div style={{fontSize:13,color:'#94a3b8',marginBottom:6}}>{label}</div>
      <input type="text" value={txt} onChange={e => {
        setTxt(e.target.value);
        const v = parseInt(e.target.value);
        if (!isNaN(v)) onChange(Math.max(min, Math.min(max, v)));
      }} onBlur={() => setTxt(String(value))} style={S.input}/>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
//  MAIN COMPONENT
// ═══════════════════════════════════════════════════════════════════════════
function App() {
  const [tab, setTab] = useState(0);
  const [data, setData] = useState([]);
  const [fname, setFname] = useState('');
  const [err, setErr] = useState('');
  const [msg, setMsg] = useState('');
  const [loading, setLoading] = useState(true);
  const [rawCsv, setRawCsv] = useState('');
  const [pctIfm, setPctIfm] = useState(30);
  const [pctIccp, setPctIccp] = useState(30);
  const [effectif, setEffectif] = useState(656);
  const [fSocial, setFSocial] = useState(16);
  const [txSalarie, setTxSalarie] = useState(2.9);
  const [txEtt, setTxEtt] = useState(3.2);
  const [txAdhCET, setTxAdhCET] = useState(50);
  const [txChoixPERCOL, setTxChoixPERCOL] = useState(40);

  // Auto-load from GitHub
  useEffect(() => {
    ghLoad().then(res => {
      try {
        const parsed = mapRows(parseCSVFrench(res.csv));
        setData(parsed); setFname('latest_marges.csv (GitHub)'); setRawCsv(res.csv);
        if (parsed.length > 0) setTab(1);
      } catch(e) {}
    }).catch(()=>{}).finally(()=>setLoading(false));
  }, []);

  const onFile = useCallback(e => {
    const file = e.target.files?.[0]; if (!file) return;
    setErr(''); setMsg('');
    file.arrayBuffer().then(buf => {
      try {
        const parsed = parseFile(buf, file.name);
        const reader = new FileReader();
        reader.onload = () => {
          const csv = reader.result;
          setRawCsv(csv); setData(parsed); setFname(file.name); setTab(1);
          setMsg('Sauvegarde GitHub...');
          ghSave(csv).then(()=>{setMsg('✓ Sauvegardé');setTimeout(()=>setMsg(''),3000);}).catch(er=>setMsg('⚠ '+er.message));
        };
        reader.readAsText(file);
      } catch(er) { setErr(er.message); }
    });
  }, []);

  // ─── Simulation ──────────────────────────────────────────────────
  const sim = useMemo(() => data.map(r => simRow(r, pctIfm/100, pctIccp/100)), [data,pctIfm,pctIccp]);
  const tot = useMemo(() => {
    const t = {n:sim.length, hrs:0, brut:0, ifm:0, iccp:0, cet:0, rB:0, rC:0, gain:0};
    sim.forEach(r => { t.hrs+=r.hrs; t.brut+=r.brut; t.ifm+=r.ifm; t.iccp+=r.iccp; t.cet+=r.cetTotal; t.rB+=r.redBase; t.rC+=r.redCet; t.gain+=r.gain; });
    return t;
  }, [sim]);

  const xf = tot.n > 0 ? effectif / tot.n : 1;
  const gA = tot.gain * 12, gX = gA * xf;

  const scenData = useMemo(() => [0,10,20,30,50,100].map(p => {
    const rows = data.map(r => simRow(r, p/100, p/100));
    const g = rows.reduce((s,r)=>s+r.gain,0);
    return {name:p+'%', gM:g, gA:g*12, gX:g*12*xf};
  }), [data,xf]);

  // ─── PERCOL (spec v2 : 2 taux adhésion, flux euro par euro) ─────
  const percol = useMemo(() => {
    const rS = txSalarie/100, rE = txEtt/100, fs = fSocial/100;
    const pAdhCET = txAdhCET/100, pChoixP = txChoixPERCOL/100;
    const txEffectif = pAdhCET * pChoixP;

    // Pool CET ajusté par adhésion
    const cetMensuelAjuste = tot.cet * pAdhCET;
    const cetAnnuelAjuste = cetMensuelAjuste * 12;
    const nbAdhCET = Math.round(tot.n * pAdhCET);
    const nbPercol = Math.round(nbAdhCET * pChoixP);
    const nbCash = nbAdhCET - nbPercol;

    // --- Pool PERCOL ---
    const poolP = cetAnnuelAjuste * pChoixP;
    const gainPlacP = poolP * rE;
    const rendVerseP = poolP * rS;
    const montantTransfP = poolP + rendVerseP;
    const forfaitPaye = montantTransfP * fs;
    const coutPERCOL = forfaitPaye + rendVerseP - gainPlacP;
    const coutCashRefP = poolP * COTIS;
    const econPERCOL = coutCashRefP - coutPERCOL;

    // --- Pool Cash ---
    const poolC = cetAnnuelAjuste * (1 - pChoixP);
    const gainPlacC = poolC * rE;
    const rendVerseC = poolC * rS;
    const cotisPayeC = (poolC + rendVerseC) * COTIS;
    const coutCETCash = cotisPayeC + rendVerseC - gainPlacC;
    const coutCashRefC = poolC * COTIS;
    const surcoutCash = coutCETCash - coutCashRefC;

    // --- 3 étages ---
    const gainNetEtage3 = econPERCOL - surcoutCash;
    const gainRGDU = tot.gain * pAdhCET * 12;
    const spreadTotal = (rE - rS) * cetAnnuelAjuste;
    const gainTotal = gainRGDU + spreadTotal + gainNetEtage3;

    // Per-worker breakdown (for display cards)
    const cetMoyMois = tot.n>0 ? tot.cet/tot.n : 0;
    const cetMoyAn = cetMoyMois * 12;
    const rendVerseUnit = cetMoyAn * rS;
    const gainPlacUnit = cetMoyAn * rE;
    // Étage 3 : Cash = 48% cotis | PERCOL = forfait social sur (principal + rendement versé)
    const coutCashUnit = cetMoyAn * COTIS;
    const coutPercolUnit = (cetMoyAn + rendVerseUnit) * fs; // juste le forfait social
    // L'économie étage 3 = cotis cash évitées - forfait social payé
    const econPercolUnit = coutCashUnit - coutPercolUnit;
    // Spread tréso (étage 2) = séparé
    const spreadUnit = (rE - rS) * cetMoyAn;
    const perWorker = {
      cetAn: cetMoyAn, rendVerse: rendVerseUnit, gainPlac: gainPlacUnit,
      coutCash: coutCashUnit, coutPercol: coutPercolUnit,
      econPercol: econPercolUnit, spreadUnit,
    };

    // Sensibilité par levier (calcul du gain total en variant UN paramètre à la fois)
    function calcTotal(pa,pp,rr,f) {
      const ca=tot.cet*pa*12, pP=ca*pp, pC=ca*(1-pp);
      const cpP=(pP+pP*rr)*f+pP*rr-pP*rE, cpC=(pC+pC*rr)*COTIS+pC*rr-pC*rE;
      const eP=pP*COTIS-cpP, sC=cpC-pC*COTIS;
      return tot.gain*pa*12 + (rE-rr)*ca + eP - sC;
    }
    const leviers = [
      {nom:'Adhésion CET', param:'adhCET', vals:[20,30,40,50,60,70,80], unit:'%',
       data: [20,30,40,50,60,70,80].map(v=>({x:v+'%', gain:calcTotal(v/100,pChoixP,rS,fs)}))},
      {nom:'Choix PERCOL', param:'choixP', vals:[20,30,40,50,60,70,80], unit:'%',
       data: [20,30,40,50,60,70,80].map(v=>({x:v+'%', gain:calcTotal(pAdhCET,v/100,rS,fs)}))},
      {nom:'Rendement salarié', param:'rendS', vals:[1,2,3,4,5,6], unit:'%',
       data: [1,2,3,4,5,6].map(v=>({x:v+'%', gain:calcTotal(pAdhCET,pChoixP,v/100,fs)}))},
      {nom:'Forfait social', param:'fs', vals:[16,18,20], unit:'%',
       data: [16,18,20].map(v=>({x:v+'%', gain:calcTotal(pAdhCET,pChoixP,rS,v/100)}))},
    ];
    // Impact marginal de chaque levier (variation de +10pp ou +1pp)
    const impacts = leviers.map(l => {
      const baseG = gainTotal;
      const vals = l.data.map(d=>d.gain);
      const maxG = Math.max(...vals), minG = Math.min(...vals);
      return {...l, range: maxG - minG, base: baseG};
    }).sort((a,b)=>b.range-a.range);

    return {
      nbAdhCET, nbPercol, nbCash, txEffectif, cetMensuelAjuste, cetAnnuelAjuste,
      poolP, poolC, gainPlacP, rendVerseP, montantTransfP, forfaitPaye, coutPERCOL, coutCashRefP, econPERCOL,
      gainPlacC, rendVerseC, cotisPayeC, coutCETCash, coutCashRefC, surcoutCash,
      gainNetEtage3, gainRGDU, spreadTotal, gainTotal, perWorker, leviers, impacts,
    };
  }, [tot,txSalarie,txEtt,fSocial,txAdhCET,txChoixPERCOL]);

  const has = data.length > 0;

  if (loading) return <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh',color:'#22c55e',fontSize:18}}>Chargement...</div>;

  return (
    <div style={S.page}>
      <div style={{marginBottom:20}}>
        <div style={S.title}>Simulateur CET × RGDU 2026</div>
        <div style={S.sub}>Optimisation charges patronales intérim — Schéma 3 étages
          {fname && <span style={{marginLeft:8,color:'#22c55e'}}>({fname} — {data.length} lignes)</span>}
        </div>
      </div>

      {/* Tabs */}
      <div style={S.tabBar}>
        {TABS.map((n,i) => <div key={n} style={S.tab(tab===i, i>0&&!has)} onClick={()=>{if(i===0||has)setTab(i);}}>{n}</div>)}
      </div>

      {err && <div style={S.errBox}>{err}</div>}
      {msg && <div style={S.msgBox}>{msg}</div>}

      {/* ═══ UPLOAD ══════════════════════════════════════════════════ */}
      {tab===0 && <div>
        <div style={{...S.card, textAlign:'center', maxWidth:520, margin:'0 auto'}}>
          <div style={{fontSize:48,marginBottom:12}}>📄</div>
          <div style={{fontSize:16,fontWeight:600,color:'#fff',marginBottom:8}}>Charger un fichier Marges</div>
          <div style={{fontSize:13,color:'#64748b',marginBottom:20}}>CSV (séparateur ;) ou XLSX — Colonnes : Hrs Paye, Brut réel, IFM réelles, ICCP réelles</div>
          {has && <div style={{...S.msgBox,marginBottom:16}}>✓ {data.length} salariés chargés depuis {fname}</div>}
          <label style={{...S.btn,display:'inline-block'}}>
            {has ? 'Actualiser le fichier' : 'Sélectionner un fichier'}
            <input type="file" accept=".csv,.xlsx,.xls" onChange={onFile} style={{display:'none'}}/>
          </label>
          <div style={{fontSize:11,color:'#475569',marginTop:12}}>Les CSV sont sauvegardés automatiquement sur GitHub</div>
        </div>
        <div style={{...S.card, maxWidth:520, margin:'20px auto 0'}}>
          <div style={{fontWeight:600,fontSize:13,color:'#fff',marginBottom:12}}>Paramètres RGDU 2026</div>
          <table style={S.table}><tbody>
            {[['SMIC horaire',RGDU.smicH+' €'],["Seuil d'extinction",RGDU.seuil+' × SMIC'],['Tmin',fmtP(RGDU.tMin)],['Tmax',fmtP(RGDU.tMax)],['Tδ',fmtP(RGDU.tDelta)],['Puissance',''+RGDU.pow]].map(([k,v])=>(
              <tr key={k} style={{borderBottom:'1px solid #1e293b'}}><td style={{padding:'4px 0',color:'#94a3b8'}}>{k}</td><td style={{padding:'4px 0',textAlign:'right',fontFamily:'monospace',color:'#fff'}}>{v}</td></tr>
            ))}
          </tbody></table>
        </div>
      </div>}

      {/* ═══ SIMULATION ══════════════════════════════════════════════ */}
      {tab===1 && has && <div>
        <div style={{...S.card,...S.grid(3)}}>
          <PBar label="% IFM vers CET" value={pctIfm} onChange={setPctIfm}/>
          <PBar label="% ICCP vers CET" value={pctIccp} onChange={setPctIccp}/>
          <NumInput label="Effectif total" value={effectif} onChange={setEffectif}/>
        </div>
        <div style={{...S.grid(5),marginBottom:20}}>
          {[
            ['Salariés',tot.n+' ('+sim.filter(r=>!r.estime).length+' réels + '+sim.filter(r=>r.estime).length+' estimés)','#8b5cf6'],
            ['CET mensuel total',fmtE(tot.cet),'#3b82f6'],
            ['Gain RGDU mensuel',fmtE2(tot.gain),'#22c55e'],
            ['Gain annuel',fmtE(gA),'#22c55e'],
            ['Gain annuel extrapolé',fmtE(gX),'#f59e0b'],
          ].map(([l,v,c])=>(
            <div key={l} style={S.kpi(c)}><div style={S.kpiLabel}>{l}</div><div style={S.kpiVal}>{v}</div></div>
          ))}
        </div>
        <div style={{...S.card,padding:0,overflow:'auto'}}>
          <table style={S.table}>
            <thead><tr>
              {['#','Matricule','Hrs','Brut réel','IFM','ICCP','CET IFM','CET ICCP','CET Total','Brut CET','Réd. base','Réd. CET','Gain'].map(h=>(
                <th key={h} style={S.th}>{h}</th>
              ))}
            </tr></thead>
            <tbody>
              {sim.slice(0,50).map((r,i)=>(
                <tr key={i}>
                  <td style={{...S.td(i%2),...S.tdR,color:'#475569'}}>{i+1}</td>
                  <td style={{...S.td(i%2),fontFamily:'monospace'}}>{r.matricule}{r.estime && <span style={{marginLeft:4,fontSize:9,padding:'1px 4px',borderRadius:3,background:'#7c3aed',color:'#fff',verticalAlign:'middle'}}>EST</span>}</td>
                  <td style={{...S.td(i%2),...S.tdR}}>{r.hrs}</td>
                  <td style={{...S.td(i%2),...S.tdR,color:r.estime?'#a78bfa':undefined}}>{fmtE2(r.brut)}</td>
                  <td style={{...S.td(i%2),...S.tdR,color:r.estime?'#a78bfa':undefined}}>{fmtE2(r.ifm)}</td>
                  <td style={{...S.td(i%2),...S.tdR,color:r.estime?'#a78bfa':undefined}}>{fmtE2(r.iccp)}</td>
                  <td style={{...S.td(i%2),...S.tdR,...S.blue}}>{fmtE2(r.cetIfm)}</td>
                  <td style={{...S.td(i%2),...S.tdR,...S.blue}}>{fmtE2(r.cetIccp)}</td>
                  <td style={{...S.td(i%2),...S.tdR,color:'#93c5fd',fontWeight:600}}>{fmtE2(r.cetTotal)}</td>
                  <td style={{...S.td(i%2),...S.tdR}}>{fmtE2(r.brutCet)}</td>
                  <td style={{...S.td(i%2),...S.tdR}}>{fmtE2(r.redBase)}</td>
                  <td style={{...S.td(i%2),...S.tdR}}>{fmtE2(r.redCet)}</td>
                  <td style={{...S.td(i%2),...S.tdR,...S.green}}>{fmtE2(r.gain)}</td>
                </tr>
              ))}
              <tr style={{background:'#0f172a',fontWeight:600}}>
                <td style={{padding:'8px 10px',color:'#fff'}} colSpan={2}>TOTAUX ({tot.n})</td>
                <td style={{...S.tdR,padding:'8px 10px',color:'#fff'}}>{tot.hrs.toFixed(0)}</td>
                <td style={{...S.tdR,padding:'8px 10px'}}>{fmtE(tot.brut)}</td>
                <td style={{...S.tdR,padding:'8px 10px'}}>{fmtE(tot.ifm)}</td>
                <td style={{...S.tdR,padding:'8px 10px'}}>{fmtE(tot.iccp)}</td>
                <td style={{...S.tdR,padding:'8px 10px'}} colSpan={2}/>
                <td style={{...S.tdR,padding:'8px 10px',color:'#93c5fd'}}>{fmtE(tot.cet)}</td>
                <td style={{...S.tdR,padding:'8px 10px'}}>{fmtE(tot.brut-tot.cet)}</td>
                <td style={{...S.tdR,padding:'8px 10px'}}>{fmtE(tot.rB)}</td>
                <td style={{...S.tdR,padding:'8px 10px'}}>{fmtE(tot.rC)}</td>
                <td style={{...S.tdR,padding:'8px 10px',...S.green}}>{fmtE2(tot.gain)}</td>
              </tr>
            </tbody>
          </table>
          {sim.length > 50 && <div style={{textAlign:'center',padding:8,fontSize:11,color:'#475569'}}>50 premières lignes sur {sim.length}</div>}
        </div>
      </div>}

      {/* ═══ GRAPHIQUES ══════════════════════════════════════════════ */}
      {tab===2 && has && <div>
        <div style={S.card}>
          <div style={{fontWeight:600,color:'#fff',marginBottom:16}}>Gain RGDU annuel par scénario CET</div>
          <ResponsiveContainer width="100%" height={350}>
            <BarChart data={scenData}><CartesianGrid stroke="#1e293b"/><XAxis dataKey="name" stroke="#64748b"/><YAxis stroke="#64748b" tickFormatter={v=>(v/1000).toFixed(0)+'k€'}/>
              <Tooltip formatter={v=>fmtE(v)} contentStyle={{background:'#1e293b',border:'none',borderRadius:8,color:'#fff'}}/>
              <Legend/><Bar dataKey="gA" name="Gain annuel (fichier)" fill="#3b82f6" radius={[4,4,0,0]}/><Bar dataKey="gX" name={'Gain extrapolé ('+effectif+')'} fill="#22c55e" radius={[4,4,0,0]}/>
            </BarChart>
          </ResponsiveContainer>
        </div>
        <div style={S.card}>
          <div style={{fontWeight:600,color:'#fff',marginBottom:16}}>Courbe du gain mensuel</div>
          <ResponsiveContainer width="100%" height={300}>
            <LineChart data={scenData}><CartesianGrid stroke="#1e293b"/><XAxis dataKey="name" stroke="#64748b"/><YAxis stroke="#64748b" tickFormatter={v=>v.toFixed(0)+'€'}/>
              <Tooltip formatter={v=>fmtE2(v)} contentStyle={{background:'#1e293b',border:'none',borderRadius:8,color:'#fff'}}/>
              <Line type="monotone" dataKey="gM" name="Gain mensuel" stroke="#22c55e" strokeWidth={2} dot={{r:5,fill:'#22c55e'}}/><ReferenceLine y={0} stroke="#475569" strokeDasharray="3 3"/>
            </LineChart>
          </ResponsiveContainer>
        </div>
        <div style={S.card}>
          <div style={{fontWeight:600,color:'#fff',marginBottom:16}}>Distribution par salarié (mensuel)</div>
          <ResponsiveContainer width="100%" height={300}>
            <BarChart data={sim.map((r,i)=>({i:i+1,g:r.gain}))}><CartesianGrid stroke="#1e293b"/><XAxis dataKey="i" stroke="#64748b"/><YAxis stroke="#64748b" tickFormatter={v=>v.toFixed(1)+'€'}/>
              <Tooltip formatter={v=>fmtE2(v)} contentStyle={{background:'#1e293b',border:'none',borderRadius:8,color:'#fff'}}/>
              <Bar dataKey="g" name="Gain RGDU" fill="#22c55e" radius={[2,2,0,0]}/>
            </BarChart>
          </ResponsiveContainer>
        </div>
      </div>}

      {/* ═══ SYNTHÈSE ════════════════════════════════════════════════ */}
      {tab===3 && has && <div>
        <div style={S.card}>
          <div style={{fontWeight:600,fontSize:16,color:'#fff',marginBottom:16}}>Synthèse — 3 scénarios CET</div>
          <table style={S.table}>
            <thead><tr><th style={S.th}/><th style={{...S.th,...S.tdR,color:'#60a5fa'}}>Prudent (10%)</th><th style={{...S.th,...S.tdR,color:'#fbbf24'}}>Moyen (30%)</th><th style={{...S.th,...S.tdR,color:'#22c55e'}}>Ambitieux (50%)</th></tr></thead>
            <tbody>
              {(() => {
                const sc = [10,30,50].map(p => {
                  const rows = data.map(r => simRow(r,p/100,p/100));
                  const g = rows.reduce((s,r)=>s+r.gain,0);
                  const c = rows.reduce((s,r)=>s+r.cetTotal,0);
                  return {p, gM:g, gA:g*12, gX:g*12*xf, cM:c, cA:c*12, gAvg:g/(rows.length||1)};
                });
                return [['CET mensuel',s=>fmtE(s.cM)],['CET annuel',s=>fmtE(s.cA)],['Gain RGDU mensuel',s=>fmtE2(s.gM)],['Gain RGDU annuel',s=>fmtE(s.gA)],['Gain annuel extrapolé',s=>fmtE(s.gX)],['Gain moyen/sal./mois',s=>fmtE2(s.gAvg)]].map(([l,fn])=>(
                  <tr key={l} style={{borderBottom:'1px solid #1e293b'}}><td style={{padding:'8px 0',color:'#94a3b8'}}>{l}</td>
                    {sc.map(s=><td key={s.p} style={{padding:'8px 0',textAlign:'right',fontFamily:'monospace',color:'#fff'}}>{fn(s)}</td>)}
                  </tr>
                ));
              })()}
            </tbody>
          </table>
          <div style={{marginTop:12,fontSize:11,color:'#475569'}}>Extrapolation ×{xf.toFixed(2)} ({tot.n} → {effectif}). Annualisation ×12.</div>
        </div>
        <div style={S.card}>
          <div style={{fontWeight:600,color:'#fff',marginBottom:16}}>Gain annuel extrapolé</div>
          <ResponsiveContainer width="100%" height={300}>
            <BarChart data={[10,30,50].map(p => {
              const g = data.map(r=>simRow(r,p/100,p/100)).reduce((s,r)=>s+r.gain,0);
              return {name:p+'% CET',v:g*12*xf};
            })}><CartesianGrid stroke="#1e293b"/><XAxis dataKey="name" stroke="#64748b"/><YAxis stroke="#64748b" tickFormatter={v=>(v/1000).toFixed(0)+'k€'}/>
              <Tooltip formatter={v=>fmtE(v)} contentStyle={{background:'#1e293b',border:'none',borderRadius:8,color:'#fff'}}/>
              <Bar dataKey="v" name="Gain extrapolé" radius={[4,4,0,0]}>
                {[0,1,2].map(i=><Cell key={i} fill={['#3b82f6','#fbbf24','#22c55e'][i]}/>)}
              </Bar>
            </BarChart>
          </ResponsiveContainer>
        </div>
      </div>}

      {/* ═══ PERCOL (spec v2) ════════════════════════════════════════ */}
      {tab===4 && has && <div>

        {/* ──── 1. HEADLINE : le résultat ──────────────────────────── */}
        <div style={{...S.card,border:'2px solid #22c55e',textAlign:'center',padding:32}}>
          <div style={{fontSize:13,color:'#94a3b8',letterSpacing:1,textTransform:'uppercase',marginBottom:8}}>Gain annuel total — 3 étages combinés</div>
          <div style={{fontSize:48,fontWeight:800,color:'#22c55e',lineHeight:1}}>{fmtE(percol.gainTotal)}</div>
          <div style={{fontSize:13,color:'#64748b',marginTop:8}}>{percol.nbAdhCET} adhérents CET ({txAdhCET}%) dont {percol.nbPercol} vers PERCOL ({txChoixPERCOL}%) — taux effectif {(percol.txEffectif*100).toFixed(0)}%</div>
          <div style={{display:'flex',justifyContent:'center',gap:32,marginTop:20}}>
            {[
              ['Étage 1 — RGDU',percol.gainRGDU,'#3b82f6'],
              ['Étage 2 — Spread tréso',percol.spreadTotal,'#8b5cf6'],
              ['Étage 3 — PERCOL net',percol.gainNetEtage3,'#22c55e'],
            ].map(([l,v,c])=>(
              <div key={l} style={{textAlign:'center'}}>
                <div style={{fontSize:11,color:'#64748b'}}>{l}</div>
                <div style={{fontSize:20,fontWeight:700,color:c,marginTop:2}}>{fmtE(v)}</div>
                <div style={{fontSize:10,color:'#475569'}}>{percol.gainTotal>0?(v/percol.gainTotal*100).toFixed(0)+'%':'—'}</div>
              </div>
            ))}
          </div>
        </div>

        {/* ──── 2. TIMELINE VISUELLE ───────────────────────────────── */}
        <div style={{...S.card,padding:0,overflow:'hidden'}}>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr'}}>
            {/* Étage 1 */}
            <div style={{padding:20,borderRight:'1px solid #1e293b'}}>
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}>
                <div style={{width:28,height:28,borderRadius:'50%',background:'#1d4ed8',display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,fontWeight:700,color:'#fff'}}>1</div>
                <div><div style={{fontSize:14,fontWeight:600,color:'#fff'}}>Entrée CET</div><div style={{fontSize:10,color:'#64748b'}}>Mois N</div></div>
              </div>
              <div style={{fontSize:12,color:'#94a3b8',lineHeight:1.6}}>
                <div>{percol.nbAdhCET} intérimaires mettent {pctIfm}% IFM + {pctIccp}% ICCP en CET</div>
                <div style={{marginTop:8}}><span style={{color:'#60a5fa',fontWeight:600}}>{fmtE(percol.cetMensuelAjuste)}</span> /mois collectés</div>
                <div style={{color:'#60a5fa',fontWeight:600}}>{fmtE(percol.cetAnnuelAjuste)} /an</div>
                <div style={{marginTop:8,padding:'6px 10px',background:'#172554',borderRadius:6,fontSize:11}}>
                  Brut mensuel réduit → <span style={{color:'#3b82f6',fontWeight:600}}>gain RGDU {fmtE(percol.gainRGDU)}/an</span>
                </div>
              </div>
            </div>
            {/* Étage 2 */}
            <div style={{padding:20,borderRight:'1px solid #1e293b'}}>
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}>
                <div style={{width:28,height:28,borderRadius:'50%',background:'#6d28d9',display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,fontWeight:700,color:'#fff'}}>2</div>
                <div><div style={{fontSize:14,fontWeight:600,color:'#fff'}}>Détention 12 mois</div><div style={{fontSize:10,color:'#64748b'}}>Mois N → N+12</div></div>
              </div>
              <div style={{fontSize:12,color:'#94a3b8',lineHeight:1.6}}>
                <div>ETT place le cash à <span style={{color:'#a78bfa',fontWeight:600}}>{txEtt}%</span></div>
                <div>Verse au salarié <span style={{color:'#a78bfa',fontWeight:600}}>{txSalarie}%</span></div>
                <div style={{marginTop:8}}><span style={{color:'#a78bfa'}}>Gains placement :</span> <span style={{fontWeight:600,color:'#fff'}}>{fmtE(percol.gainPlacP + percol.gainPlacC)}</span></div>
                <div><span style={{color:'#a78bfa'}}>Rendement versé :</span> <span style={{fontWeight:600,color:'#fff'}}>−{fmtE(percol.rendVerseP + percol.rendVerseC)}</span></div>
                <div style={{marginTop:8,padding:'6px 10px',background:'#2e1065',borderRadius:6,fontSize:11}}>
                  Spread net → <span style={{color:'#8b5cf6',fontWeight:600}}>{fmtE(percol.spreadTotal)}/an</span>
                </div>
              </div>
            </div>
            {/* Étage 3 */}
            <div style={{padding:20}}>
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}>
                <div style={{width:28,height:28,borderRadius:'50%',background:'#15803d',display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,fontWeight:700,color:'#fff'}}>3</div>
                <div><div style={{fontSize:14,fontWeight:600,color:'#fff'}}>Sortie</div><div style={{fontSize:10,color:'#64748b'}}>Mois N+12</div></div>
              </div>
              <div style={{fontSize:12,color:'#94a3b8',lineHeight:1.6}}>
                <div style={{display:'flex',gap:12,marginBottom:8}}>
                  <div style={{flex:1,padding:8,background:'#172554',borderRadius:6,textAlign:'center'}}>
                    <div style={{fontSize:10,color:'#fbbf24'}}>→ Cash ({percol.nbCash} pers.)</div>
                    <div style={{fontSize:10}}>48% cotisations</div>
                    <div style={{color:'#f87171',fontWeight:600,fontSize:12}}>surcoût {fmtE(percol.surcoutCash)}</div>
                  </div>
                  <div style={{flex:1,padding:8,background:'#052e16',borderRadius:6,textAlign:'center'}}>
                    <div style={{fontSize:10,color:'#22c55e'}}>→ PERCOL ({percol.nbPercol} pers.)</div>
                    <div style={{fontSize:10}}>{fSocial}% forfait social</div>
                    <div style={{color:'#22c55e',fontWeight:600,fontSize:12}}>économie {fmtE(percol.econPERCOL)}</div>
                  </div>
                </div>
                <div style={{padding:'6px 10px',background:'#052e16',borderRadius:6,fontSize:11}}>
                  Net étage 3 → <span style={{color:'#22c55e',fontWeight:600}}>{fmtE(percol.gainNetEtage3)}/an</span>
                </div>
              </div>
            </div>
          </div>
        </div>

        {/* ──── 3. PARAMÈTRES (compact) ────────────────────────────── */}
        <div style={S.card}>
          <div style={{fontWeight:600,color:'#fff',marginBottom:12,fontSize:14}}>Paramètres</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr 1fr 1fr',gap:12}}>
            <PBar label="IFM → CET" value={pctIfm} onChange={setPctIfm}/>
            <PBar label="ICCP → CET" value={pctIccp} onChange={setPctIccp}/>
            <PBar label="Adhésion CET" value={txAdhCET} onChange={setTxAdhCET} min={10} max={100} step={5}/>
            <PBar label="Choix PERCOL" value={txChoixPERCOL} onChange={setTxChoixPERCOL} min={10} max={100} step={5}/>
            <PBar label="Rend. salarié" value={txSalarie} onChange={setTxSalarie} min={1} max={8} step={0.1}/>
            <PBar label="Rend. placement" value={txEtt} onChange={setTxEtt} min={1} max={8} step={0.1}/>
          </div>
          <div style={{display:'flex',gap:8,marginTop:12,alignItems:'center'}}>
            <span style={{fontSize:13,color:'#94a3b8'}}>Forfait social :</span>
            {[16,20].map(v=><button key={v} onClick={()=>setFSocial(v)} style={S.btnSec(fSocial===v)}>{v}%{v===16?' (pilotée)':''}</button>)}
          </div>
        </div>

        {/* ──── 4. COÛT PAR INTÉRIMAIRE ──────────────────────────── */}
        <div style={S.card}>
          <div style={{fontWeight:600,fontSize:14,color:'#fff',marginBottom:4}}>Coût par intérimaire (moyenne annuelle)</div>
          <div style={{fontSize:11,color:'#64748b',marginBottom:16}}>CET moyen : {fmtE2(percol.perWorker.cetAn/12)}/mois → {fmtE(percol.perWorker.cetAn)}/an</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
            {/* Cash */}
            <div style={{background:'#1e1b0f',border:'1px solid #854d0e',borderRadius:12,padding:20}}>
              <div style={{fontSize:14,fontWeight:700,color:'#fbbf24',marginBottom:12}}>Sortie Cash (48% cotisations)</div>
              <div style={{fontSize:12,color:'#94a3b8',lineHeight:2}}>
                <div style={{display:'flex',justifyContent:'space-between'}}><span>Cotisations patronales sur principal</span><span style={{color:'#f87171',fontWeight:600}}>{fmtE(percol.perWorker.coutCash)}</span></div>
                <div style={{borderTop:'2px solid #854d0e',paddingTop:8,marginTop:8,display:'flex',justifyContent:'space-between',fontWeight:700}}>
                  <span style={{color:'#fff'}}>Coût net employeur</span>
                  <span style={{color:'#fbbf24',fontSize:16}}>{fmtE(percol.perWorker.coutCash)}</span>
                </div>
              </div>
              <div style={{marginTop:10,fontSize:10,color:'#64748b',fontStyle:'italic'}}>Le rendement versé et les gains placement (spread) sont comptés séparément dans l'étage 2.</div>
            </div>
            {/* PERCOL */}
            <div style={{background:'#052e16',border:'1px solid #166534',borderRadius:12,padding:20}}>
              <div style={{fontSize:14,fontWeight:700,color:'#22c55e',marginBottom:12}}>Sortie PERCOL ({fSocial}% forfait social)</div>
              <div style={{fontSize:12,color:'#94a3b8',lineHeight:2}}>
                <div style={{display:'flex',justifyContent:'space-between'}}><span>Forfait social sur (principal + rend.)</span><span style={{color:'#fbbf24'}}>{fmtE((percol.perWorker.cetAn + percol.perWorker.rendVerse) * fSocial/100)}</span></div>
                <div style={{borderTop:'2px solid #166534',paddingTop:8,marginTop:8,display:'flex',justifyContent:'space-between',fontWeight:700}}>
                  <span style={{color:'#fff'}}>Coût net employeur</span>
                  <span style={{color:'#22c55e',fontSize:16}}>{fmtE((percol.perWorker.cetAn + percol.perWorker.rendVerse) * fSocial/100)}</span>
                </div>
              </div>
              <div style={{marginTop:10,fontSize:10,color:'#64748b',fontStyle:'italic'}}>Le rendement et le placement sont comptés dans l'étage 2 (spread tréso) pendant les 12 mois de détention. Après transfert PERCOL, l'ETT ne détient plus le cash.</div>
            </div>
          </div>
          <div style={{textAlign:'center',marginTop:16,padding:12,background:'#052e16',borderRadius:8}}>
            <span style={{color:'#94a3b8'}}>Économie par intérimaire PERCOL : </span>
            <span style={{color:'#22c55e',fontWeight:700,fontSize:18}}>{fmtE(percol.perWorker.econPercol)}/an</span>
            <span style={{color:'#64748b',marginLeft:8}}>× {percol.nbPercol} adhérents = </span>
            <span style={{color:'#22c55e',fontWeight:700,fontSize:18}}>{fmtE(percol.econPERCOL)}</span>
          </div>
        </div>

        {/* ──── 5. SUR QUEL LEVIER APPUYER ? ───────────────────────── */}
        <div style={S.card}>
          <div style={{fontWeight:600,fontSize:14,color:'#fff',marginBottom:4}}>Sur quel levier appuyer ?</div>
          <div style={{fontSize:11,color:'#64748b',marginBottom:16}}>Impact de chaque paramètre sur le gain total (les autres restent fixes)</div>
          <div style={{marginBottom:20}}>
            {percol.impacts.map((l,i) => {
              const maxRange = percol.impacts[0].range || 1;
              const pct = (l.range / maxRange) * 100;
              const colors = ['#22c55e','#3b82f6','#fbbf24','#8b5cf6'];
              return (
                <div key={l.nom} style={{marginBottom:12}}>
                  <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                    <span style={{fontSize:13,color:'#fff',fontWeight:600}}>{i+1}. {l.nom}</span>
                    <span style={{fontSize:13,color:colors[i],fontWeight:700}}>amplitude : {fmtE(l.range)}</span>
                  </div>
                  <div style={{height:24,background:'#0f172a',borderRadius:6,overflow:'hidden'}}>
                    <div style={{height:'100%',width:pct+'%',background:colors[i],borderRadius:6,transition:'width .3s'}}/>
                  </div>
                </div>
              );
            })}
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
            {percol.leviers.map(l => (
              <div key={l.nom} style={{background:'#0f172a',borderRadius:8,padding:16}}>
                <div style={{fontSize:12,fontWeight:600,color:'#fff',marginBottom:8}}>{l.nom}</div>
                <ResponsiveContainer width="100%" height={180}>
                  <BarChart data={l.data}><CartesianGrid stroke="#1e293b"/>
                    <XAxis dataKey="x" stroke="#64748b" fontSize={10}/>
                    <YAxis stroke="#64748b" tickFormatter={v=>(v/1000).toFixed(0)+'k'} fontSize={10}/>
                    <Tooltip formatter={v=>fmtE(v)} contentStyle={{background:'#1e293b',border:'none',borderRadius:8,color:'#fff'}}/>
                    <Bar dataKey="gain" radius={[3,3,0,0]}>
                      {l.data.map((_,j)=><Cell key={j} fill={j===l.data.findIndex(d=>d.gain===Math.max(...l.data.map(dd=>dd.gain)))?'#22c55e':'#334155'}/>)}
                    </Bar>
                    <ReferenceLine y={percol.gainTotal} stroke="#22c55e" strokeDasharray="3 3"/>
                  </BarChart>
                </ResponsiveContainer>
              </div>
            ))}
          </div>
        </div>
      </div>}


      <div style={S.footer}>Simulateur CET × RGDU 2026 — Les deltas sont fiables, les montants absolus sont à recaler.<br/>C = 0,02 + 0,3813 × [½ × (3×SMIC×H/Brut − 1)]^1,75</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
