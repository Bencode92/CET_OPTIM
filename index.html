<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simulateur CET × RGDU 2026</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: {
      navy: { 900:'#0a0f1e', 800:'#111827', 700:'#1e293b', 600:'#334155' },
      accent: { green:'#22c55e', greenDark:'#15803d', blue:'#3b82f6', blueDark:'#1d4ed8' }
    }}}}
  </script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/htm@3/dist/htm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <style>
    body { margin:0; font-family:system-ui,-apple-system,sans-serif; background:#0a0f1e; color:#e2e8f0; }
    input[type="range"] { height:6px; }
    input[type="range"]::-webkit-slider-runnable-track { background:#334155; border-radius:4px; }
    input[type="range"]::-webkit-slider-thumb { background:#22c55e; }
    ::-webkit-scrollbar { width:8px; height:8px; }
    ::-webkit-scrollbar-track { background:#111827; }
    ::-webkit-scrollbar-thumb { background:#334155; border-radius:4px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    var html=htm.bind(React.createElement);
    var useState=React.useState,useMemo=React.useMemo,useCallback=React.useCallback,useRef=React.useRef,useEffect=React.useEffect;

    var RGDU={smicHoraire:12.02,seuil:3,tMin:0.02,tMax:0.4013,tDelta:0.3813,puissance:1.75};
    var COTIS=0.48;
    var PROXY='https://studyforge-proxy.benoit-comas.workers.dev';
    var GH_PATH='Bencode92/CET_OPTIM/contents/data/historique/latest_marges.csv';
    var TAB_NAMES=['Upload','Simulation','Graphiques','Synth\u00e8se','PERCOL'];

    // ─── GitHub via Cloudflare proxy ──────────────────────────────────
    function loadFromGitHub(){
      return fetch(PROXY+'/github/'+GH_PATH).then(function(r){
        if(!r.ok) throw new Error('not found');
        return r.json();
      }).then(function(json){
        var content=atob(json.content.replace(/\n/g,''));
        return {csv:content, sha:json.sha};
      });
    }

    function saveToGitHub(csvContent){
      return fetch(PROXY+'/github/'+GH_PATH).then(function(r){
        if(r.ok) return r.json().then(function(j){return j.sha;});
        return null;
      }).then(function(sha){
        var body={message:'data: update marges CSV ('+new Date().toISOString().slice(0,10)+')',content:btoa(unescape(encodeURIComponent(csvContent)))};
        if(sha) body.sha=sha;
        return fetch(PROXY+'/github/'+GH_PATH,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
      }).then(function(r){
        if(!r.ok) return r.json().then(function(j){throw new Error(j.message||'Erreur GitHub');});
        return r.json();
      });
    }

    // ─── RGDU Calc ────────────────────────────────────────────────────
    function computeRgdu(hrs,brut){
      if(hrs<=0||brut<=0)return 0;
      var r=(RGDU.seuil*hrs*RGDU.smicHoraire)/brut;
      if(r<=1)return 0;
      return Math.min(RGDU.tMin+RGDU.tDelta*Math.pow(0.5*(r-1),RGDU.puissance),RGDU.tMax)*brut;
    }
    function computeRow(row,pi,pc){
      var ci=row.ifm*pi,cc=row.iccp*pc,ct=ci+cc,bc=row.brut-ci-cc;
      var rb=computeRgdu(row.hrs,row.brut),rc=computeRgdu(row.hrs,bc);
      return Object.assign({},row,{cetIfm:ci,cetIccp:cc,cetTotal:ct,brutCet:bc,redBase:rb,redCet:rc,gain:rc-rb});
    }

    // ─── Parser ───────────────────────────────────────────────────────
    function parseCSVString(text){
      // Strip BOM
      if(text.charCodeAt(0)===0xFEFF) text=text.slice(1);
      // Detect delimiter
      var firstLine=text.split(/\r?\n/)[0];
      var delim=firstLine.includes(';')?';':',';
      var lines=text.split(/\r?\n/).filter(function(l){return l.trim();});
      var headers=lines[0].split(delim).map(function(h){return h.trim();});
      var rows=[];
      for(var i=1;i<lines.length;i++){
        var values=lines[i].split(delim);
        var row={};
        headers.forEach(function(h,j){
          var val=(values[j]||'').trim();
          var numVal=val.replace(',','.');
          var parsed=parseFloat(numVal);
          row[h]=!isNaN(parsed)&&val!==''?parsed:val;
        });
        rows.push(row);
      }
      return rows;
    }
    function parseFileData(buf,name){
      var ext=name.split('.').pop().toLowerCase(),rows;
      if(ext==='csv'){rows=parseCSVString(new TextDecoder('utf-8').decode(buf));}
      else{var wb=XLSX.read(buf,{type:'array'});rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);}
      return mapRows(rows);
    }
    function mapRows(rows){
      function det(cols,p){return cols.find(function(c){var cl=c.toLowerCase();return p.every(function(x){return cl.includes(x);});});}
      var cols=rows.length?Object.keys(rows[0]):[];
      var cm={hrs:det(cols,['hrs','paye'])||det(cols,['heures']),brut:det(cols,['brut','r\u00e9el'])||det(cols,['brut','reel']),
        ifm:det(cols,['ifm','r\u00e9el'])||det(cols,['ifm','reel'])||det(cols,['ifm']),
        iccp:det(cols,['iccp','r\u00e9el'])||det(cols,['iccp','reel'])||det(cols,['iccp']),
        matricule:det(cols,['matricule']),nom:det(cols,['nom'])||det(cols,['salari\u00e9']),
        cotPat:det(cols,['cot','pat']),reduction:det(cols,['r\u00e9duction'])||det(cols,['reduction']),
        marge:cols.find(function(c){return c.toLowerCase().trim()==='marge';})};
      var miss=['hrs','brut','ifm','iccp'].filter(function(k){return !cm[k];});
      if(miss.length)throw new Error('Colonnes manquantes : '+miss.join(', '));
      return rows.map(function(r){return{matricule:r[cm.matricule]||'',nom:r[cm.nom]||'',hrs:parseFloat(r[cm.hrs])||0,brut:parseFloat(r[cm.brut])||0,ifm:parseFloat(r[cm.ifm])||0,iccp:parseFloat(r[cm.iccp])||0,cotPat:cm.cotPat?parseFloat(r[cm.cotPat])||0:0,reductionActuelle:cm.reduction?parseFloat(r[cm.reduction])||0:0,marge:cm.marge?parseFloat(r[cm.marge])||0:0};}).filter(function(r){return r.hrs>0&&r.ifm>0;});
    }

    // ─── Formatters ───────────────────────────────────────────────────
    function fmtEur(v){v=Number(v);return isFinite(v)?v.toLocaleString('fr-FR',{style:'currency',currency:'EUR',maximumFractionDigits:0}):'0 \u20ac';}
    function fmtEur2(v){v=Number(v);return isFinite(v)?v.toLocaleString('fr-FR',{style:'currency',currency:'EUR',minimumFractionDigits:2,maximumFractionDigits:2}):'0,00 \u20ac';}
    function fmtPct(v){v=Number(v);return isFinite(v)?((v*100).toFixed(0)+' %'):'0 %';}

    // ─── Chart wrapper ────────────────────────────────────────────────
    Chart.defaults.color='#94a3b8';
    Chart.defaults.borderColor='#1e293b';
    function ChartCanvas(props){
      var ref=useRef(null),ch=useRef(null);
      useEffect(function(){
        if(!ref.current)return;
        if(ch.current)ch.current.destroy();
        ch.current=new Chart(ref.current,props.config);
        return function(){if(ch.current)ch.current.destroy();};
      },[JSON.stringify(props.config)]);
      return html`<canvas ref=${ref} height=${props.height||300}></canvas>`;
    }

    // ─── ProgressBar Slider ──────────────────────────────────────────
    function SliderParam(p){
      var mn=p.min!=null?p.min:0,mx=p.max!=null?p.max:100,st=p.step!=null?p.step:1,u=p.unit!=null?p.unit:'%';
      var pct=((p.value-mn)/(mx-mn))*100;
      return html`<div className="flex flex-col gap-1">
        <label className="text-sm font-medium text-slate-300">${p.label} : <span className="font-bold text-green-400">${p.value}${u}</span></label>
        <div className="relative h-8 bg-navy-900 rounded-lg border border-slate-600 overflow-hidden cursor-pointer"
          onClick=${function(e){var rect=e.currentTarget.getBoundingClientRect();var x=(e.clientX-rect.left)/rect.width;var val=mn+Math.round((x*(mx-mn))/st)*st;p.onChange(Math.max(mn,Math.min(mx,val)));}}>
          <div className="absolute inset-y-0 left-0 bg-gradient-to-r from-green-600 to-green-400 rounded-lg transition-all duration-150" style=${"width:"+pct+"%"}></div>
          <div className="absolute inset-0 flex items-center justify-center text-xs font-bold text-white drop-shadow">${p.value}${u}</div>
        </div>
        <input type="range" min=${mn} max=${mx} step=${st} value=${p.value} onChange=${function(e){p.onChange(Number(e.target.value));}} className="w-full accent-green-500 h-1 opacity-0 absolute" style="pointer-events:none" />
        <div className="flex justify-between text-xs text-slate-500"><span>${mn}${u}</span><span>${mx}${u}</span></div>
      </div>`;
    }

    // ─── Number Input ─────────────────────────────────────────────────
    function NumberInput(p){
      return html`<div className="flex flex-col gap-1">
        <label className="text-sm font-medium text-slate-300">${p.label}</label>
        <input type="number" min=${p.min||0} max=${p.max||99999} step=${p.step||1} value=${p.value}
          onChange=${function(e){var v=parseInt(e.target.value)||0;p.onChange(Math.max(p.min||0,Math.min(p.max||99999,v)));}}
          className="w-full px-4 py-2 bg-navy-900 border border-slate-600 rounded-lg text-lg font-bold text-green-400 text-center focus:border-green-500 focus:outline-none focus:ring-1 focus:ring-green-500" />
      </div>`;
    }

    // ─── Main ─────────────────────────────────────────────────────────
    function Simulateur(){
      var _at=useState(0),activeTab=_at[0],setActiveTab=_at[1];
      var _d=useState([]),data=_d[0],setData=_d[1];
      var _fn=useState(''),fileName=_fn[0],setFileName=_fn[1];
      var _er=useState(''),error=_er[0],setError=_er[1];
      var _msg=useState(''),msg=_msg[0],setMsg=_msg[1];
      var _ld=useState(true),loading=_ld[0],setLoading=_ld[1];
      var _csv=useState(''),rawCsv=_csv[0],setRawCsv=_csv[1];
      var _pi=useState(30),pctIfm=_pi[0],setPctIfm=_pi[1];
      var _pc=useState(30),pctIccp=_pc[0],setPctIccp=_pc[1];
      var _ef=useState(660),effectifTotal=_ef[0],setEffectifTotal=_ef[1];
      var _fs=useState(16),forfaitSocial=_fs[0],setForfaitSocial=_fs[1];
      var _rc=useState(3),rendementCet=_rc[0],setRendementCet=_rc[1];
      var _ta=useState(30),tauxAdhesion=_ta[0],setTauxAdhesion=_ta[1];

      // Auto-load from GitHub on mount
      useEffect(function(){
        loadFromGitHub().then(function(res){
          try{
            var rows=parseCSVString(res.csv);
            var parsed=mapRows(rows);
            setData(parsed); setFileName('latest_marges.csv (GitHub)'); setRawCsv(res.csv);
            if(parsed.length>0) setActiveTab(1);
          }catch(e){/* no valid data on GH */}
        }).catch(function(){/* no file yet */}).finally(function(){setLoading(false);});
      },[]);

      var handleFile=useCallback(function(e){
        var file=e.target.files&&e.target.files[0];if(!file)return;
        setError('');setMsg('');
        file.arrayBuffer().then(function(buf){
          try{
            var parsed=parseFileData(buf,file.name);
            // Read as text for saving
            var reader=new FileReader();
            reader.onload=function(){
              var csvText=reader.result;
              setRawCsv(csvText);
              setData(parsed);setFileName(file.name);setActiveTab(1);
              // Auto-save to GitHub via proxy
              setMsg('Sauvegarde sur GitHub...');
              saveToGitHub(csvText).then(function(){setMsg('\u2713 Sauvegard\u00e9 sur GitHub');setTimeout(function(){setMsg('');},3000);})
                .catch(function(err){setMsg('\u26a0 '+err.message);});
            };
            reader.readAsText(file);
          }catch(err){setError(err.message);}
        });
      },[]);

      var simulated=useMemo(function(){return data.map(function(r){return computeRow(r,pctIfm/100,pctIccp/100);});},[data,pctIfm,pctIccp]);
      var totals=useMemo(function(){
        var t={n:simulated.length,hrs:0,brut:0,ifm:0,iccp:0,cetTotal:0,redBase:0,redCet:0,gain:0,cotPat:0,marge:0};
        simulated.forEach(function(r){t.hrs+=r.hrs;t.brut+=r.brut;t.ifm+=r.ifm;t.iccp+=r.iccp;t.cetTotal+=r.cetTotal;t.redBase+=r.redBase;t.redCet+=r.redCet;t.gain+=r.gain;t.cotPat+=r.cotPat;t.marge+=r.marge;});
        return t;
      },[simulated]);

      var xf=totals.n>0?effectifTotal/totals.n:1;
      var gainAnnuel=totals.gain*12,gainExtrapole=gainAnnuel*xf;

      var scenarioData=useMemo(function(){
        return [0,10,20,30,50,100].map(function(pct){
          var rows=data.map(function(r){return computeRow(r,pct/100,pct/100);});
          var g=rows.reduce(function(s,r){return s+r.gain;},0);
          return{name:pct+'%',gM:g,gA:g*12,gX:g*12*xf};
        });
      },[data,xf]);

      var percolData=useMemo(function(){
        var avg=totals.n>0?totals.cetTotal/totals.n:0,ann=avg*12;
        var rend=ann*(rendementCet/100),tot=ann+rend;
        var cc=ann*COTIS,ccc=cc+rend;
        var fs=forfaitSocial/100,fa=tot*fs,ccp=fa+rend;
        var ec=cc-ccp,nbA=Math.round(effectifTotal*(tauxAdhesion/100));
        var adhS=[20,30,50,70,100].map(function(t){var nb=Math.round(effectifTotal*(t/100));return{taux:t+'%',nb:nb,econ:ec*nb};});
        return{avg:avg,ann:ann,rend:rend,scenarios:[
          {name:'Cash direct',principal:ann,rendV:0,cotis:cc,forfait:0,cout:cc,econ:0},
          {name:'CET \u2192 Cash',principal:ann,rendV:rend,cotis:cc,forfait:0,cout:ccc,econ:cc-ccc},
          {name:'CET \u2192 PERCOL',principal:ann,rendV:rend,cotis:0,forfait:fa,cout:ccp,econ:ec}
        ],nbA:nbA,econTot:ec*nbA,adhS:adhS};
      },[totals,rendementCet,forfaitSocial,effectifTotal,tauxAdhesion]);

      var hasData=data.length>0;

      // ═══ Chart configs ══════════════════════════════════════════════
      var barScenCfg=useMemo(function(){return{type:'bar',data:{labels:scenarioData.map(function(s){return s.name;}),datasets:[
        {label:'Gain annuel (fichier)',data:scenarioData.map(function(s){return s.gA;}),backgroundColor:'#3b82f6',borderRadius:4},
        {label:'Gain extrapol\u00e9 ('+effectifTotal+')',data:scenarioData.map(function(s){return s.gX;}),backgroundColor:'#22c55e',borderRadius:4}
      ]},options:{responsive:true,plugins:{legend:{labels:{color:'#e2e8f0'}},tooltip:{callbacks:{label:function(c){return c.dataset.label+' : '+fmtEur(c.parsed.y);}}}},scales:{y:{grid:{color:'#1e293b'},ticks:{callback:function(v){return(v/1000).toFixed(0)+'k\u20ac';}}},x:{grid:{color:'#1e293b'}}}}};},[scenarioData,effectifTotal]);

      var lineCfg=useMemo(function(){return{type:'line',data:{labels:scenarioData.map(function(s){return s.name;}),datasets:[
        {label:'Gain mensuel',data:scenarioData.map(function(s){return s.gM;}),borderColor:'#22c55e',backgroundColor:'rgba(34,197,94,0.15)',fill:true,tension:0.3,pointRadius:5,pointBackgroundColor:'#22c55e'}
      ]},options:{responsive:true,plugins:{legend:{labels:{color:'#e2e8f0'}}},scales:{y:{grid:{color:'#1e293b'},ticks:{callback:function(v){return v.toFixed(0)+'\u20ac';}}},x:{grid:{color:'#1e293b'}}}}};},[scenarioData]);

      var distCfg=useMemo(function(){return{type:'bar',data:{labels:simulated.map(function(_,i){return i+1;}),datasets:[
        {label:'Gain RGDU',data:simulated.map(function(r){return r.gain;}),backgroundColor:'#22c55e',borderRadius:2}
      ]},options:{responsive:true,plugins:{legend:{display:false}},scales:{x:{grid:{color:'#1e293b'},title:{display:true,text:'Salari\u00e9',color:'#94a3b8'}},y:{grid:{color:'#1e293b'},ticks:{callback:function(v){return v.toFixed(1)+'\u20ac';}}}}}};},[simulated]);

      var synthCfg=useMemo(function(){
        var sc=[10,30,50].map(function(p){var rows=data.map(function(r){return computeRow(r,p/100,p/100);});var g=rows.reduce(function(s,r){return s+r.gain;},0);return{n:p+'%',v:g*12*xf};});
        return{type:'bar',data:{labels:sc.map(function(s){return s.n;}),datasets:[{label:'Gain extrapol\u00e9',data:sc.map(function(s){return s.v;}),backgroundColor:['#3b82f6','#f59e0b','#22c55e'],borderRadius:4}]},options:{responsive:true,plugins:{legend:{labels:{color:'#e2e8f0'}}},scales:{y:{grid:{color:'#1e293b'},ticks:{callback:function(v){return(v/1000).toFixed(0)+'k\u20ac';}}},x:{grid:{color:'#1e293b'}}}}};
      },[data,xf]);

      var pBarCfg=useMemo(function(){return{type:'bar',data:{labels:percolData.scenarios.map(function(s){return s.name;}),datasets:[
        {label:'Cotisations patronales',data:percolData.scenarios.map(function(s){return s.cotis;}),backgroundColor:'#ef4444'},
        {label:'Forfait social',data:percolData.scenarios.map(function(s){return s.forfait;}),backgroundColor:'#f59e0b'},
        {label:'Rendement vers\u00e9',data:percolData.scenarios.map(function(s){return s.rendV;}),backgroundColor:'#3b82f6'}
      ]},options:{responsive:true,plugins:{legend:{labels:{color:'#e2e8f0'}}},scales:{x:{stacked:true,grid:{color:'#1e293b'}},y:{stacked:true,grid:{color:'#1e293b'},ticks:{callback:function(v){return v.toFixed(0)+'\u20ac';}}}}}};
      },[percolData]);

      var adhCfg=useMemo(function(){return{type:'bar',data:{labels:percolData.adhS.map(function(s){return s.taux;}),datasets:[
        {label:'\u00c9conomie annuelle',data:percolData.adhS.map(function(s){return s.econ;}),backgroundColor:['#3b82f6','#22c55e','#f59e0b','#ef4444','#8b5cf6'],borderRadius:4}
      ]},options:{responsive:true,plugins:{legend:{labels:{color:'#e2e8f0'}}},scales:{y:{grid:{color:'#1e293b'},ticks:{callback:function(v){return(v/1000).toFixed(0)+'k\u20ac';}}},x:{grid:{color:'#1e293b'}}}}};
      },[percolData]);

      // ═══ RENDER ═════════════════════════════════════════════════════
      if(loading) return html`<div className="min-h-screen bg-navy-900 flex items-center justify-center"><div className="text-green-400 text-lg">Chargement...</div></div>`;

      return html`<div className="min-h-screen bg-navy-900 p-4 md:p-8">
        <header className="mb-6">
          <h1 className="text-2xl font-bold text-white">Simulateur CET \u00d7 RGDU 2026</h1>
          <p className="text-sm text-slate-400">Optimisation charges patronales int\u00e9rim \u2014 Sch\u00e9ma 3 \u00e9tages
            ${fileName && html`<span className="ml-2 text-green-400">(${fileName} \u2014 ${data.length} lignes)</span>`}
          </p>
        </header>

        <nav className="flex gap-1 mb-6 border-b border-slate-700">
          ${TAB_NAMES.map(function(name,i){var dis=i>0&&!hasData;
            return html`<button key=${name} onClick=${function(){if(!dis)setActiveTab(i);}}
              className=${"px-4 py-2 text-sm font-medium rounded-t transition-colors "+(activeTab===i?'bg-navy-700 border border-b-0 border-slate-600 text-green-400 ':'text-slate-400 hover:text-white hover:bg-navy-800 ')+(dis?'opacity-30 cursor-not-allowed':'cursor-pointer')}
            >${name}</button>`;
          })}
        </nav>

        ${error && html`<div className="mb-4 p-3 bg-red-900/50 border border-red-700 rounded text-red-300 text-sm">${error}</div>`}
        ${msg && html`<div className="mb-4 p-3 bg-green-900/50 border border-green-700 rounded text-green-300 text-sm">${msg}</div>`}

        ${activeTab===0 && html`<section className="max-w-xl mx-auto">
          <div className="bg-navy-800 rounded-xl border border-slate-700 p-8 text-center">
            <div className="mb-4 text-5xl">\ud83d\udcc4</div>
            <h2 className="text-lg font-semibold mb-2 text-white">Charger un fichier Marges</h2>
            <p className="text-sm text-slate-400 mb-6">CSV ou XLSX \u2014 Colonnes : Hrs Paye, Brut r\u00e9el, IFM r\u00e9elles, ICCP r\u00e9elles.</p>
            ${hasData && html`<div className="mb-4 p-3 bg-green-900/30 border border-green-800 rounded text-green-400 text-sm">
              \u2713 Donn\u00e9es charg\u00e9es : ${data.length} salari\u00e9s depuis ${fileName}
            </div>`}
            <label className="inline-block px-6 py-3 bg-green-600 text-white font-medium rounded-lg cursor-pointer hover:bg-green-700 transition">
              ${hasData?'Actualiser le fichier':'S\u00e9lectionner un fichier'}
              <input type="file" accept=".csv,.xlsx,.xls" onChange=${handleFile} className="hidden" />
            </label>
          </div>

          <p className="mt-3 text-xs text-slate-500 text-center">Les CSV sont sauvegard\u00e9s automatiquement sur GitHub</p>

          <div className="mt-6 bg-navy-800 rounded-xl border border-slate-700 p-6">
            <h3 className="font-semibold mb-3 text-sm text-white">Param\u00e8tres RGDU 2026</h3>
            <table className="w-full text-sm"><tbody>
              ${[['SMIC horaire',RGDU.smicHoraire+' \u20ac'],["Seuil d'extinction",RGDU.seuil+' \u00d7 SMIC'],['Tmin',fmtPct(RGDU.tMin)],['Tmax',fmtPct(RGDU.tMax)],['T\u03b4',fmtPct(RGDU.tDelta)],['Puissance',''+RGDU.puissance]].map(function(kv){
                return html`<tr key=${kv[0]} className="border-b border-slate-700"><td className="py-1 text-slate-400">${kv[0]}</td><td className="py-1 font-mono text-right text-white">${kv[1]}</td></tr>`;
              })}
            </tbody></table>
          </div>
        </section>`}

        ${activeTab===1 && hasData && html`<section>
          <div className="bg-navy-800 rounded-xl border border-slate-700 p-6 mb-6 grid grid-cols-1 md:grid-cols-3 gap-6">
            <${SliderParam} label="% IFM vers CET" value=${pctIfm} onChange=${setPctIfm} />
            <${SliderParam} label="% ICCP vers CET" value=${pctIccp} onChange=${setPctIccp} />
            <${NumberInput} label="Effectif total" value=${effectifTotal} onChange=${setEffectifTotal} min=${1} max=${99999} step=${1} />
          </div>
          <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
            ${[['CET mensuel total',fmtEur(totals.cetTotal),'border-blue-500 bg-blue-950/50'],['Gain RGDU mensuel',fmtEur2(totals.gain),'border-green-500 bg-green-950/50'],['Gain annuel (fichier)',fmtEur(gainAnnuel),'border-green-500 bg-green-950/50'],['Gain annuel extrapol\u00e9',fmtEur(gainExtrapole),'border-amber-500 bg-amber-950/50']].map(function(c){
              return html`<div key=${c[0]} className=${"rounded-xl p-4 border-l-4 "+c[2]}><div className="text-xs font-medium text-slate-400">${c[0]}</div><div className="text-xl font-bold mt-1 text-white">${c[1]}</div></div>`;
            })}
          </div>
          <div className="bg-navy-800 rounded-xl border border-slate-700 overflow-x-auto">
            <table className="w-full text-xs">
              <thead><tr className="bg-navy-700">
                ${['#','Matricule','Hrs','Brut r\u00e9el','IFM','ICCP','CET IFM','CET ICCP','CET Total','Brut CET','R\u00e9d. base','R\u00e9d. CET','Gain'].map(function(h){return html`<th key=${h} className="px-2 py-2 text-left font-medium text-slate-300">${h}</th>`;})}
              </tr></thead>
              <tbody>
                ${simulated.slice(0,50).map(function(r,i){return html`<tr key=${i} className=${i%2===0?'bg-navy-900/50':'bg-navy-800'}>
                  <td className="px-2 py-1 text-slate-500">${i+1}</td><td className="px-2 py-1 font-mono text-slate-300">${r.matricule}</td>
                  <td className="px-2 py-1 text-right text-slate-300">${r.hrs}</td><td className="px-2 py-1 text-right">${fmtEur2(r.brut)}</td>
                  <td className="px-2 py-1 text-right">${fmtEur2(r.ifm)}</td><td className="px-2 py-1 text-right">${fmtEur2(r.iccp)}</td>
                  <td className="px-2 py-1 text-right text-blue-400">${fmtEur2(r.cetIfm)}</td><td className="px-2 py-1 text-right text-blue-400">${fmtEur2(r.cetIccp)}</td>
                  <td className="px-2 py-1 text-right font-medium text-blue-300">${fmtEur2(r.cetTotal)}</td><td className="px-2 py-1 text-right">${fmtEur2(r.brutCet)}</td>
                  <td className="px-2 py-1 text-right">${fmtEur2(r.redBase)}</td><td className="px-2 py-1 text-right">${fmtEur2(r.redCet)}</td>
                  <td className="px-2 py-1 text-right font-bold text-green-400">${fmtEur2(r.gain)}</td>
                </tr>`;})}
                <tr className="bg-navy-700 font-medium">
                  <td className="px-2 py-2 text-white" colSpan=${2}>TOTAUX (${totals.n})</td>
                  <td className="px-2 py-2 text-right text-white">${totals.hrs.toFixed(0)}</td><td className="px-2 py-2 text-right">${fmtEur(totals.brut)}</td>
                  <td className="px-2 py-2 text-right">${fmtEur(totals.ifm)}</td><td className="px-2 py-2 text-right">${fmtEur(totals.iccp)}</td>
                  <td className="px-2 py-2 text-right">${fmtEur(totals.cetTotal*pctIfm/((pctIfm+pctIccp)||1))}</td>
                  <td className="px-2 py-2 text-right">${fmtEur(totals.cetTotal*pctIccp/((pctIfm+pctIccp)||1))}</td>
                  <td className="px-2 py-2 text-right text-blue-300">${fmtEur(totals.cetTotal)}</td>
                  <td className="px-2 py-2 text-right">${fmtEur(totals.brut-totals.cetTotal)}</td>
                  <td className="px-2 py-2 text-right">${fmtEur(totals.redBase)}</td><td className="px-2 py-2 text-right">${fmtEur(totals.redCet)}</td>
                  <td className="px-2 py-2 text-right text-green-300">${fmtEur2(totals.gain)}</td>
                </tr>
              </tbody>
            </table>
            ${simulated.length>50 && html`<p className="text-xs text-slate-500 p-2 text-center">50 premi\u00e8res lignes sur ${simulated.length}</p>`}
          </div>
        </section>`}

        ${activeTab===2 && hasData && html`<section className="space-y-8">
          <div className="bg-navy-800 rounded-xl border border-slate-700 p-6"><h3 className="font-semibold mb-4 text-white">Gain RGDU annuel par sc\u00e9nario</h3><${ChartCanvas} config=${barScenCfg} height=${350} /></div>
          <div className="bg-navy-800 rounded-xl border border-slate-700 p-6"><h3 className="font-semibold mb-4 text-white">Courbe du gain mensuel</h3><${ChartCanvas} config=${lineCfg} height=${300} /></div>
          <div className="bg-navy-800 rounded-xl border border-slate-700 p-6"><h3 className="font-semibold mb-4 text-white">Distribution par salari\u00e9</h3><${ChartCanvas} config=${distCfg} height=${300} /></div>
        </section>`}

        ${activeTab===3 && hasData && html`<section className="space-y-6">
          <div className="bg-navy-800 rounded-xl border border-slate-700 p-6">
            <h3 className="font-semibold mb-4 text-lg text-white">Synth\u00e8se \u2014 3 sc\u00e9narios CET</h3>
            <table className="w-full text-sm">
              <thead><tr className="border-b-2 border-slate-600"><th className="py-2 text-left"></th><th className="py-2 text-right text-blue-400">Prudent (10%)</th><th className="py-2 text-right text-amber-400">Moyen (30%)</th><th className="py-2 text-right text-green-400">Ambitieux (50%)</th></tr></thead>
              <tbody>
                ${(function(){
                  var sc=[10,30,50].map(function(p){var rows=data.map(function(r){return computeRow(r,p/100,p/100);});var g=rows.reduce(function(s,r){return s+r.gain;},0);var cet=rows.reduce(function(s,r){return s+r.cetTotal;},0);return{p:p,gM:g,gA:g*12,gX:g*12*xf,cM:cet,cA:cet*12,gAvg:g/(rows.length||1)};});
                  return[['CET mensuel',function(s){return fmtEur(s.cM);}],['CET annuel',function(s){return fmtEur(s.cA);}],['Gain RGDU mensuel',function(s){return fmtEur2(s.gM);}],['Gain RGDU annuel',function(s){return fmtEur(s.gA);}],['Gain annuel extrapol\u00e9',function(s){return fmtEur(s.gX);}],['Gain moyen/sal./mois',function(s){return fmtEur2(s.gAvg);}]].map(function(it){
                    return html`<tr key=${it[0]} className="border-b border-slate-700"><td className="py-2 text-slate-400">${it[0]}</td>${sc.map(function(s){return html`<td key=${s.p} className="py-2 text-right font-mono text-white">${it[1](s)}</td>`;})}</tr>`;});
                })()}
              </tbody>
            </table>
            <p className="mt-4 text-xs text-slate-500">Extrapolation \u00d7${xf.toFixed(2)} (${totals.n} \u2192 ${effectifTotal}). Annualisation \u00d712.</p>
          </div>
          <div className="bg-navy-800 rounded-xl border border-slate-700 p-6"><h3 className="font-semibold mb-4 text-white">Gain annuel extrapol\u00e9</h3><${ChartCanvas} config=${synthCfg} height=${300} /></div>
        </section>`}

        ${activeTab===4 && hasData && html`<section className="space-y-6">
          <div className="bg-navy-800 rounded-xl border border-slate-700 p-6 grid grid-cols-1 md:grid-cols-4 gap-6">
            <${SliderParam} label="% IFM vers CET" value=${pctIfm} onChange=${setPctIfm} />
            <${SliderParam} label="% ICCP vers CET" value=${pctIccp} onChange=${setPctIccp} />
            <div className="flex flex-col gap-1">
              <label className="text-sm font-medium text-slate-300">Forfait social : <span className="font-bold text-green-400">${forfaitSocial} %</span></label>
              <div className="flex gap-2 mt-1">
                ${[16,20].map(function(v){return html`<button key=${v} onClick=${function(){setForfaitSocial(v);}} className=${"px-4 py-2 rounded-lg font-medium text-sm transition "+(forfaitSocial===v?'bg-green-600 text-white':'bg-navy-700 text-slate-400 hover:bg-navy-600')}>${v}%${v===16?' (pilot\u00e9e)':' (standard)'}</button>`;})}
              </div>
            </div>
            <${SliderParam} label="Rendement CET" value=${rendementCet} onChange=${setRendementCet} min=${1} max=${8} step=${0.5} />
          </div>
          <div className="bg-navy-800 rounded-xl border border-slate-700 p-6"><${SliderParam} label="Taux d'adh\u00e9sion PERCOL" value=${tauxAdhesion} onChange=${setTauxAdhesion} min=${10} max=${100} step=${5} /></div>

          <div className="bg-navy-800 rounded-xl border border-slate-700 p-6">
            <h3 className="font-semibold mb-4 text-lg text-white">Comparaison par int\u00e9rimaire (CET moyen : ${fmtEur2(percolData.avg)}/mois \u2192 ${fmtEur(percolData.ann)}/an)</h3>
            <table className="w-full text-sm">
              <thead><tr className="border-b-2 border-slate-600"><th className="py-2 text-left"></th><th className="py-2 text-right px-3 text-slate-400">Cash direct</th><th className="py-2 text-right px-3 text-amber-400">CET \u2192 Cash</th><th className="py-2 text-right px-3 text-green-400">CET \u2192 PERCOL</th></tr></thead>
              <tbody>
                ${[['Principal annuel','principal'],['Rendement CET','rendV'],['Cotisations (48%)','cotis'],['Forfait social ('+forfaitSocial+'%)','forfait'],['Co\u00fbt employeur','cout'],['\u00c9conomie vs cash','econ']].map(function(it){
                  var l=it[0],k=it[1];
                  return html`<tr key=${l} className=${"border-b border-slate-700 "+(k==='cout'?'font-bold bg-navy-700/50 ':'')+(k==='econ'?'font-bold ':'')}>
                    <td className="py-2 text-slate-400">${l}</td>
                    ${percolData.scenarios.map(function(s){return html`<td key=${s.name} className=${"py-2 text-right px-3 font-mono "+(k==='econ'&&s[k]>0?'text-green-400 ':'')+(k==='econ'&&s[k]<0?'text-red-400 ':'text-white')}>${fmtEur(s[k])}</td>`;})}
                  </tr>`;
                })}
              </tbody>
            </table>
          </div>

          <div className="bg-navy-800 rounded-xl border border-slate-700 p-6">
            <h3 className="font-semibold mb-4 text-lg text-white">Extrapolation \u2014 ${effectifTotal} int\u00e9rimaires</h3>
            <table className="w-full text-sm">
              <thead><tr className="border-b-2 border-slate-600"><th className="py-2 text-left text-slate-400">Taux</th><th className="py-2 text-right text-slate-400">Nb</th><th className="py-2 text-right text-slate-400">\u00c9conomie annuelle</th></tr></thead>
              <tbody>${percolData.adhS.map(function(s){return html`<tr key=${s.taux} className=${"border-b border-slate-700 "+(s.taux===tauxAdhesion+'%'?'bg-green-900/30':'')}>
                <td className="py-2 text-white">${s.taux}</td><td className="py-2 text-right font-mono text-white">${s.nb}</td><td className="py-2 text-right font-mono text-green-400 font-bold">${fmtEur(s.econ)}</td>
              </tr>`;})}</tbody>
            </table>
          </div>

          <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div className="bg-navy-800 rounded-xl border border-slate-700 p-6"><h3 className="font-semibold mb-4 text-white">Co\u00fbt employeur</h3><${ChartCanvas} config=${pBarCfg} height=${300} /></div>
            <div className="bg-navy-800 rounded-xl border border-slate-700 p-6"><h3 className="font-semibold mb-4 text-white">\u00c9conomie par adh\u00e9sion</h3><${ChartCanvas} config=${adhCfg} height=${300} /></div>
          </div>

          <div className="bg-green-950/50 border border-green-800 rounded-xl p-6">
            <h3 className="font-bold text-green-400 text-lg mb-2">Levier : 48% \u2192 ${forfaitSocial}% = \u00e9conomie de ${48-forfaitSocial} points</h3>
            <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mt-4">
              <div className="text-center"><div className="text-3xl font-bold text-green-400">${fmtEur(percolData.scenarios[2].econ)}</div><div className="text-sm text-green-600">\u00e9conomie / int\u00e9rimaire / an</div></div>
              <div className="text-center"><div className="text-3xl font-bold text-green-400">${percolData.nbA}</div><div className="text-sm text-green-600">adh\u00e9rents (${tauxAdhesion}%)</div></div>
              <div className="text-center"><div className="text-3xl font-bold text-green-400">${fmtEur(percolData.econTot)}</div><div className="text-sm text-green-600">\u00e9conomie totale</div></div>
            </div>
          </div>
        </section>`}

        <footer className="mt-8 text-center text-xs text-slate-600">
          Simulateur CET \u00d7 RGDU 2026 \u2014 Les deltas sont fiables, les montants absolus sont \u00e0 recaler.<br/>
          C = 0,02 + 0,3813 \u00d7 [\u00bd \u00d7 (3\u00d7SMIC\u00d7H/Brut \u2212 1)]^1,75
        </footer>
      </div>`;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(html`<${Simulateur} />`);
  </script>
</body>
</html>
